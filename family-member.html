<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 家庭成员与声纹</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
</head>
<body>
<div style="display:flex;align-items:center;padding:8px 16px 12px">
  <a href="javascript:history.back()" style="width:36px;height:36px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center">
    <i class="ph ph-caret-left" style="font-size:20px;color:var(--text-h)"></i>
  </a>
  <div style="flex:1;text-align:center;font-size:17px;font-weight:700;color:var(--text-h)">家庭成员声纹</div>
  <div style="width:36px"></div>
</div>
<div class="page-content" style="padding-top:0">

  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:18px;margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:14px;padding-bottom:14px;border-bottom:1px solid var(--border-light)">
      <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#FB923C,#F97316);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:white">妈</div>
      <div style="flex:1"><div style="font-size:17px;font-weight:700;color:var(--text-h)">晓梅</div><div style="font-size:12px;color:var(--text-muted);margin-top:2px">小莉的妈妈 · 管理员 · 138****6789</div></div>
      <span style="display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(34,197,94,.1);color:#16A34A"><i class="ph ph-waveform" style="font-size:13px"></i> 声纹已录</span>
    </div>
    <div style="padding-top:14px">
      <div style="font-size:13px;font-weight:600;color:var(--text-sub);margin-bottom:10px">个人信息</div>
      <div style="display:flex;justify-content:space-between;padding:6px 0"><span style="font-size:13px;color:var(--text-sub)">昵称</span><span style="font-size:13px;color:var(--text-h)">晓梅</span></div>
      <div style="display:flex;justify-content:space-between;padding:6px 0"><span style="font-size:13px;color:var(--text-sub)">角色</span><span style="font-size:13px;color:var(--text-h)">妈妈（管理员）</span></div>
      <div style="display:flex;justify-content:space-between;padding:6px 0"><span style="font-size:13px;color:var(--text-sub)">手机号</span><span style="font-size:13px;color:var(--text-h)">138****6789</span></div>
    </div>
  </div>

  <div style="font-size:13px;font-weight:700;color:var(--text-sub);margin:8px 0 10px;padding:0 2px">其他家庭成员</div>

  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:14px 18px;margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#60A5FA,#3B82F6);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white">爸</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:600;color:var(--text-h)">志远</div><div style="font-size:11px;color:var(--text-muted)">小莉的爸爸</div></div>
      <div style="display:flex;align-items:center;gap:6px">
        <span onclick="alert('播放志远的声纹样本…')" style="width:30px;height:30px;border-radius:50%;background:rgba(34,197,94,.1);display:flex;align-items:center;justify-content:center;cursor:pointer"><i class="ph ph-play" style="font-size:15px;color:#16A34A"></i></span>
        <span onclick="alert('编辑志远的声纹')" style="width:30px;height:30px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center;cursor:pointer"><i class="ph ph-pencil-simple" style="font-size:15px;color:var(--text-sub)"></i></span>
        <span onclick="alert('确认删除志远的声纹？')" style="width:30px;height:30px;border-radius:50%;background:rgba(239,68,68,.08);display:flex;align-items:center;justify-content:center;cursor:pointer"><i class="ph ph-trash" style="font-size:15px;color:#EF4444"></i></span>
      </div>
    </div>
  </div>

  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:14px 18px;margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#FBBF24,#F59E0B);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white">莉</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:600;color:var(--text-h)">小莉</div><div style="font-size:11px;color:var(--text-muted)">孩子 · 6岁</div></div>
      <div style="display:flex;align-items:center;gap:6px">
        <span onclick="alert('播放小莉的声纹样本…')" style="width:30px;height:30px;border-radius:50%;background:rgba(34,197,94,.1);display:flex;align-items:center;justify-content:center;cursor:pointer"><i class="ph ph-play" style="font-size:15px;color:#16A34A"></i></span>
        <span onclick="alert('编辑小莉的声纹')" style="width:30px;height:30px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center;cursor:pointer"><i class="ph ph-pencil-simple" style="font-size:15px;color:var(--text-sub)"></i></span>
        <span onclick="alert('确认删除小莉的声纹？')" style="width:30px;height:30px;border-radius:50%;background:rgba(239,68,68,.08);display:flex;align-items:center;justify-content:center;cursor:pointer"><i class="ph ph-trash" style="font-size:15px;color:#EF4444"></i></span>
      </div>
    </div>
  </div>

  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:14px 18px;margin-bottom:10px;cursor:pointer" onclick="alert('邀请新成员')">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:44px;height:44px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center"><i class="ph ph-plus" style="font-size:20px;color:var(--text-muted)"></i></div>
      <div style="flex:1"><div style="font-size:15px;font-weight:600;color:var(--text-sub)">添加家庭成员声纹</div><div style="font-size:11px;color:var(--text-muted)">录入家人声纹，让 luki 识别每一位家人</div></div>
    </div>
  </div>

</div>
</body>
</html>
