<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 发送留言</title>
<link rel="stylesheet" href="style.css">
<script src='https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js'></script>
</head>
<body>
<div class="status-bar">
  <span style="font-weight:700;font-size:15px;font-family:var(--font-en)">9:41</span>
  <div class="s-icons">
    <i class="ph ph-cell-signal-full" style="font-size:16px"></i>
    <i class="ph ph-wifi-high" style="font-size:16px"></i>
    <i class="ph ph-battery-full" style="font-size:16px"></i>
  </div>
</div><div class="sub-header">
  <a href="moments.html" class="back-btn"><i class="ph ph-caret-left" style="font-size:20px"></i></a>
  <div class="sub-title">发送留言</div>
  <div style="width:36px"></div>
</div>
<div class="page-content">
  <div style="text-align:center;padding:30px 0">
    <div style="width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--c-primary),#FF8A65);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 32px rgba(249,115,22,.3);cursor:pointer;animation:pulse 2s infinite">
      <i class="ph ph-microphone" style="font-size:44px;color:white"></i>
    </div>
    <div style="font-size:16px;font-weight:700;color:var(--text-h);margin-bottom:4px">按住录音</div>
    <div style="font-size:13px;color:var(--text-muted)">录一段语音留言给小莉吧</div>
  </div>
  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:18px;margin-bottom:14px">
    <div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:10px">或者写一段文字</div>
    <textarea style="width:100%;height:80px;border:1px solid var(--border-light);border-radius:var(--r-md);padding:12px;font-size:13px;font-family:var(--font-cn);resize:none;background:var(--bg-muted)" placeholder="写下你想对小莉说的话..."></textarea>
    <button style="width:100%;margin-top:10px;padding:14px;background:var(--c-primary);color:white;border:none;border-radius:var(--r-lg);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-cn)" onclick="alert('留言已发送！💌')">发送留言</button>
  </div>
</div>
<style>@keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 8px 32px rgba(249,115,22,.3)}50%{transform:scale(1.05);box-shadow:0 12px 40px rgba(249,115,22,.45)}}</style>
</body></html>
