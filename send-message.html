<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 发送留言</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
</head>
<body>
<div style="display:flex;align-items:center;padding:8px 16px 12px">
  <a href="javascript:history.back()" style="width:36px;height:36px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center">
    <i class="ph ph-caret-left" style="font-size:20px;color:var(--text-h)"></i>
  </a>
  <div style="flex:1;text-align:center;font-size:17px;font-weight:700;color:var(--text-h)">给孩子留言</div>
  <div style="width:36px"></div>
</div>
<div class="page-content" style="padding-top:0">

  <!-- 留言对象 -->
  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:16px 18px;margin-bottom:14px">
    <div style="font-size:13px;font-weight:600;color:var(--text-sub);margin-bottom:10px">留言给</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#FBBF24,#F59E0B);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:white">莉</div>
      <div style="flex:1"><div style="font-size:15px;font-weight:600;color:var(--text-h)">小莉</div><div style="font-size:11px;color:var(--text-muted)">luki 会在合适的时间播放给她听</div></div>
    </div>
  </div>

  <!-- 录音区域 -->
  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:30px 18px;margin-bottom:14px;text-align:center">
    <div style="font-size:15px;font-weight:600;color:var(--text-h);margin-bottom:6px">按住录音</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:24px">长按下方按钮开始录制语音留言</div>
    <div style="display:flex;justify-content:center;margin-bottom:20px">
      <button onclick="alert('正在录音…松开发送')" style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#AB47BC,#7E57C2);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 24px rgba(126,87,194,.35)">
        <i class="ph ph-microphone" style="font-size:36px;color:white"></i>
      </button>
    </div>
    <div style="font-size:11px;color:var(--text-muted)">最长 60 秒</div>
  </div>

  <!-- 或者文字留言 -->
  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:16px 18px;margin-bottom:14px">
    <div style="font-size:13px;font-weight:600;color:var(--text-sub);margin-bottom:10px">或者文字留言</div>
    <textarea placeholder="写下你想对小莉说的话…" style="width:100%;height:100px;border:1.5px solid var(--border);border-radius:var(--r-md);padding:12px;font-size:14px;font-family:var(--font-cn);color:var(--text-body);resize:none;outline:none;background:var(--bg-subtle)"></textarea>
    <div style="display:flex;justify-content:flex-end;margin-top:10px">
      <button onclick="alert('留言已发送！luki 会在合适的时间播放给小莉听 💜')" style="padding:10px 24px;background:linear-gradient(135deg,#AB47BC,#7E57C2);color:white;border:none;border-radius:var(--r-full);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-cn);box-shadow:0 4px 14px rgba(126,87,194,.3)">发送留言</button>
    </div>
  </div>

</div>
</body>
</html>
