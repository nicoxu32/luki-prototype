<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 给孩子留言</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
/* ── 页面布局 ── */
.voice-page{display:flex;flex-direction:column;align-items:center;padding:0 24px;min-height:calc(100vh - 60px)}

/* ── 留言对象 pill ── */
.to-pill{display:inline-flex;align-items:center;gap:8px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--r-full);padding:7px 16px 7px 10px;box-shadow:var(--shadow-card)}
.to-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#FBBF24,#F59E0B);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:white}

/* ── 波形动画 ── */
.wave-bars{display:flex;align-items:center;justify-content:center;gap:4px;height:56px}
.wave-bar{width:4px;border-radius:2px;background:var(--c-violet);transform-origin:center bottom;transition:height .1s}
.wave-bar.idle{height:6px;background:var(--border)}
.wave-bar.active{animation:wavePulse .6s ease-in-out infinite alternate}
@keyframes wavePulse{
  from{height:8px}
  to{height:46px}
}
.wave-bar:nth-child(1){animation-delay:0s}
.wave-bar:nth-child(2){animation-delay:.08s}
.wave-bar:nth-child(3){animation-delay:.16s}
.wave-bar:nth-child(4){animation-delay:.24s}
.wave-bar:nth-child(5){animation-delay:.32s}
.wave-bar:nth-child(6){animation-delay:.24s}
.wave-bar:nth-child(7){animation-delay:.16s}
.wave-bar:nth-child(8){animation-delay:.08s}
.wave-bar:nth-child(9){animation-delay:0s}
.wave-bar:nth-child(10){animation-delay:.08s}
.wave-bar:nth-child(11){animation-delay:.16s}
.wave-bar:nth-child(12){animation-delay:.24s}
.wave-bar:nth-child(13){animation-delay:.32s}
.wave-bar:nth-child(14){animation-delay:.24s}
.wave-bar:nth-child(15){animation-delay:.16s}

/* ── 大麦克风按钮 ── */
.mic-btn{width:88px;height:88px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;position:relative}
.mic-btn.idle{background:linear-gradient(135deg,#AB47BC,#7E57C2);box-shadow:0 6px 24px rgba(126,87,194,.35)}
.mic-btn.recording{background:linear-gradient(135deg,#EF4444,#DC2626);box-shadow:0 6px 28px rgba(239,68,68,.45)}
.mic-btn.recording::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(239,68,68,.3);animation:ripple 1.2s linear infinite}
@keyframes ripple{0%{transform:scale(1);opacity:.6}100%{transform:scale(1.4);opacity:0}}
.mic-btn:active{transform:scale(.93)}

/* ── 计时器 ── */
.timer{font-family:var(--font-en);font-size:32px;font-weight:800;color:var(--text-h);letter-spacing:2px;line-height:1;font-variant-numeric:tabular-nums}
.timer.recording{color:#EF4444}

/* ── 状态提示文字 ── */
.status-hint{font-size:13px;color:var(--text-muted);font-weight:500;text-align:center}

/* ── 预览态播放条 ── */
.preview-bar{display:flex;align-items:center;gap:12px;background:var(--bg-muted);border-radius:var(--r-full);padding:10px 16px;width:100%;box-sizing:border-box}
.preview-play{width:36px;height:36px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--c-violet);box-shadow:0 2px 8px rgba(139,92,246,.3);flex-shrink:0}
.preview-wave{flex:1;height:4px;border-radius:2px;background:linear-gradient(to right,#C4B5FD 40%,var(--border) 40%)}
.preview-dur{font-size:12px;font-family:var(--font-en);color:var(--text-muted)}

/* ── 操作按钮行 ── */
.action-row{display:flex;gap:14px;width:100%}
.btn-cancel{flex:1;padding:14px;border-radius:var(--r-xl);border:1.5px solid var(--border-light);background:white;color:var(--text-sub);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-cn);transition:.15s}
.btn-cancel:active{transform:scale(.97);background:var(--bg-muted)}
.btn-send{flex:2;padding:14px;border-radius:var(--r-xl);border:none;background:linear-gradient(135deg,#AB47BC,#7E57C2);color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-cn);box-shadow:0 4px 14px rgba(126,87,194,.3);transition:.15s}
.btn-send:active{transform:scale(.97)}

/* ── 淡入动画 ── */
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div style="display:flex;align-items:center;padding:8px 16px 12px">
  <a href="javascript:history.back()" style="width:36px;height:36px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center">
    <i class="ph ph-caret-left" style="font-size:20px;color:var(--text-h)"></i>
  </a>
  <div style="flex:1;text-align:center;font-size:17px;font-weight:700;color:var(--text-h)">给孩子留言</div>
  <div style="width:36px"></div>
</div>

<div class="voice-page" style="padding-top:24px;gap:0">

  <!-- 留言对象 -->
  <div class="to-pill" style="margin-bottom:40px">
    <div class="to-avatar">莉</div>
    <span style="font-size:13px;color:var(--text-sub)">留言给 <strong style="color:var(--text-h)">小莉</strong></span>
    <span style="font-size:11px;color:var(--text-muted);margin-left:2px">· luki 会在合适的时间播放</span>
  </div>

  <!-- ════ 状态1：初始 idle 态 ════ -->
  <div id="state-idle" class="fade-in" style="display:flex;flex-direction:column;align-items:center;gap:28px;width:100%">
    <!-- 静态波形 -->
    <div class="wave-bars">
      <div class="wave-bar idle"></div><div class="wave-bar idle"></div><div class="wave-bar idle"></div>
      <div class="wave-bar idle"></div><div class="wave-bar idle"></div><div class="wave-bar idle"></div>
      <div class="wave-bar idle"></div><div class="wave-bar idle"></div><div class="wave-bar idle"></div>
      <div class="wave-bar idle"></div><div class="wave-bar idle"></div><div class="wave-bar idle"></div>
      <div class="wave-bar idle"></div><div class="wave-bar idle"></div><div class="wave-bar idle"></div>
    </div>
    <!-- 计时器占位 -->
    <div class="timer">0:00</div>
    <!-- 大麦克风按钮 -->
    <button class="mic-btn idle" onclick="startRecording()">
      <i class="ph ph-microphone" style="font-size:38px;color:white"></i>
    </button>
    <div class="status-hint">点击开始录音</div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:-16px">最长 60 秒</div>
  </div>

  <!-- ════ 状态2：录音中 recording 态 ════ -->
  <div id="state-recording" style="display:none;flex-direction:column;align-items:center;gap:28px;width:100%">
    <!-- 动态波形 -->
    <div class="wave-bars" id="recordingWave">
      <div class="wave-bar active"></div><div class="wave-bar active"></div><div class="wave-bar active"></div>
      <div class="wave-bar active"></div><div class="wave-bar active"></div><div class="wave-bar active"></div>
      <div class="wave-bar active"></div><div class="wave-bar active"></div><div class="wave-bar active"></div>
      <div class="wave-bar active"></div><div class="wave-bar active"></div><div class="wave-bar active"></div>
      <div class="wave-bar active"></div><div class="wave-bar active"></div><div class="wave-bar active"></div>
    </div>
    <!-- 计时器 -->
    <div class="timer recording" id="timerDisplay">0:00</div>
    <!-- 录音中按钮（点击停止） -->
    <button class="mic-btn recording" onclick="stopRecording()">
      <i class="ph ph-stop" style="font-size:32px;color:white"></i>
    </button>
    <div class="status-hint" style="color:#EF4444;font-weight:600">录音中 · 点击停止</div>
  </div>

  <!-- ════ 状态3：预览 preview 态 ════ -->
  <div id="state-preview" style="display:none;flex-direction:column;align-items:center;gap:24px;width:100%">
    <!-- 播放条 -->
    <div style="margin-top:8px;width:100%">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;text-align:center">录音完成 · <span id="finalDur">0:00</span></div>
      <div class="preview-bar">
        <button class="preview-play" onclick="togglePreviewPlay(this)">
          <i class="ph ph-play" style="font-size:16px;color:white"></i>
        </button>
        <div class="preview-wave"></div>
        <span class="preview-dur" id="previewDurLabel">0:00</span>
      </div>
    </div>
    <!-- 发送/重录按钮 -->
    <div class="action-row fade-in">
      <button class="btn-cancel" onclick="resetRecording()">
        <i class="ph ph-arrow-counter-clockwise" style="font-size:15px;vertical-align:-2px"></i> 重录
      </button>
      <button class="btn-send" onclick="sendVoice()">
        <i class="ph ph-paper-plane-tilt" style="font-size:15px;vertical-align:-2px"></i> 发送留言
      </button>
    </div>
  </div>

</div>

<script>
var timerInterval = null;   /* 计时器 interval */
var seconds = 0;            /* 已录秒数 */
var maxSeconds = 60;        /* 最长录音时间 */

/* ── 格式化秒数为 m:ss ── */
function fmt(s) {
  return Math.floor(s / 60) + ':' + (s % 60 < 10 ? '0' : '') + (s % 60);
}

/* ── 切换显示态 ── */
function showState(name) {
  ['idle','recording','preview'].forEach(function(n) {
    var el = document.getElementById('state-' + n);
    el.style.display = (n === name) ? 'flex' : 'none';
  });
}

/* ── 开始录音 ── */
function startRecording() {
  seconds = 0;
  document.getElementById('timerDisplay').textContent = fmt(0);
  showState('recording');
  timerInterval = setInterval(function() {
    seconds++;
    document.getElementById('timerDisplay').textContent = fmt(seconds);
    /* 到达最长时间自动停止 */
    if (seconds >= maxSeconds) stopRecording();
  }, 1000);
}

/* ── 停止录音 ── */
function stopRecording() {
  clearInterval(timerInterval);
  var dur = fmt(seconds);
  document.getElementById('finalDur').textContent = dur;
  document.getElementById('previewDurLabel').textContent = dur;
  showState('preview');
}

/* ── 重录 ── */
function resetRecording() {
  seconds = 0;
  showState('idle');
}

/* ── 预览播放/暂停切换 ── */
function togglePreviewPlay(btn) {
  var icon = btn.querySelector('i');
  if (icon.classList.contains('ph-play')) {
    icon.className = 'ph ph-pause';
    /* 模拟播放进度 */
    btn._playTimer = setInterval(function() {
      var wave = btn.closest('.preview-bar').querySelector('.preview-wave');
      /* 简单动画：增加已播放进度色 */
    }, 200);
  } else {
    icon.className = 'ph ph-play';
    clearInterval(btn._playTimer);
  }
}

/* ── 发送留言 ── */
function sendVoice() {
  var dur = fmt(seconds);
  alert('语音留言已发送（' + dur + '）\nluki 会在合适的时间播放给小莉听 💜');
  history.back();
}
</script>

</body>
</html>
