<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 智能体管理</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
/* ── 智能体卡片 ── */
.agent-card{background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.agent-icon{width:50px;height:50px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.agent-toggle{width:44px;height:24px;border-radius:12px;position:relative;flex-shrink:0;cursor:pointer;transition:.2s}
.agent-toggle.on{background:#16A34A}
.agent-toggle.off{background:#E5E7EB}
.agent-toggle::after{content:'';position:absolute;top:2px;width:20px;height:20px;border-radius:50%;background:white;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:.2s}
.agent-toggle.on::after{right:2px}
.agent-toggle.off::after{left:2px}
.agent-card.inactive{opacity:.55}

/* ── 底部固定按钮 ── */
.fixed-bottom{position:fixed;bottom:0;left:0;right:0;display:flex;gap:10px;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--border-light)}
.btn-new{flex:1;padding:13px;border-radius:var(--r-xl);border:1.5px solid var(--c-primary);background:white;color:var(--c-primary);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-cn);display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.btn-new:active{background:var(--bg-muted);transform:scale(.97)}
.btn-redeem{flex:1;padding:13px;border-radius:var(--r-xl);border:none;background:linear-gradient(135deg,var(--c-primary),#FB923C);color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-cn);display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 12px rgba(249,115,22,.25);transition:.15s}
.btn-redeem:active{transform:scale(.97)}

/* ── 底部弹窗 ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:none;align-items:flex-end;justify-content:center}
.sheet-overlay.show{display:flex}
.sheet{background:white;border-radius:var(--r-xl) var(--r-xl) 0 0;padding:20px 20px 36px;width:100%;max-width:480px;animation:slideUp .25s ease;max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-title{font-size:16px;font-weight:800;color:var(--text-h);text-align:center;margin-bottom:20px}
.form-label{font-size:12px;font-weight:700;color:var(--text-sub);margin-bottom:6px}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border-light);border-radius:var(--r-lg);font-size:14px;color:var(--text-h);font-family:var(--font-cn);outline:none;transition:.2s;box-sizing:border-box}
.form-input:focus{border-color:var(--c-primary)}
.form-textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border-light);border-radius:var(--r-lg);font-size:13px;color:var(--text-h);font-family:var(--font-cn);outline:none;resize:none;height:80px;transition:.2s;box-sizing:border-box;line-height:1.6}
.form-textarea:focus{border-color:var(--c-primary)}
.sp-select-btn{padding:7px 14px;border-radius:var(--r-full);font-size:12px;font-weight:600;border:1.5px solid var(--border-light);background:white;color:var(--text-sub);cursor:pointer;transition:.15s;font-family:var(--font-cn)}
.sp-select-btn.active{background:var(--c-primary);color:white;border-color:var(--c-primary)}
.emoji-picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.emoji-opt{width:40px;height:40px;border-radius:12px;border:1.5px solid var(--border-light);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;background:white;transition:.15s}
.emoji-opt.selected{border-color:var(--c-primary);background:#FFF7ED}
.sheet-btn-row{display:flex;gap:10px;margin-top:16px}
.sheet-cancel{flex:1;padding:13px;border-radius:var(--r-lg);border:1.5px solid var(--border-light);background:white;color:var(--text-body);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-cn)}
.sheet-confirm{flex:2;padding:13px;border-radius:var(--r-lg);border:none;background:linear-gradient(135deg,var(--c-primary),#FB923C);color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-cn)}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div style="display:flex;align-items:center;padding:8px 16px 12px">
  <a href="javascript:history.back()" style="width:36px;height:36px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center">
    <i class="ph ph-caret-left" style="font-size:20px;color:var(--text-h)"></i>
  </a>
  <div style="flex:1;text-align:center;font-size:17px;font-weight:700;color:var(--text-h)">智能体管理</div>
  <div style="width:36px"></div>
</div>

<!-- 页面内容（底部留出固定按钮高度） -->
<div class="page-content" style="padding-top:0;padding-bottom:80px">

  <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin:0 0 10px;padding:0 2px;letter-spacing:.04em">已开启的智能体</div>

  <!-- luki 伙伴 -->
  <div class="agent-card">
    <div class="agent-icon" style="background:linear-gradient(135deg,#FBBF24,#F97316)">🦕</div>
    <div style="flex:1">
      <div style="font-size:15px;font-weight:700;color:var(--text-h)">luki 伙伴</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px">默认陪伴智能体 · 情感支持</div>
    </div>
    <div class="agent-toggle on" onclick="toggleAgent(this)"></div>
  </div>

  <!-- 英语小教练 -->
  <div class="agent-card">
    <div class="agent-icon" style="background:linear-gradient(135deg,#60A5FA,#3B82F6)">📚</div>
    <div style="flex:1">
      <div style="font-size:15px;font-weight:700;color:var(--text-h)">英语小教练</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px">学习类智能体 · 英语启蒙</div>
    </div>
    <div class="agent-toggle on" onclick="toggleAgent(this)"></div>
  </div>

  <!-- 创意伙伴 -->
  <div class="agent-card">
    <div class="agent-icon" style="background:linear-gradient(135deg,#C4B5FD,#8B5CF6)">🎨</div>
    <div style="flex:1">
      <div style="font-size:15px;font-weight:700;color:var(--text-h)">创意伙伴</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px">创意类智能体 · 画画 / 故事</div>
    </div>
    <div class="agent-toggle on" onclick="toggleAgent(this)"></div>
  </div>

  <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin:16px 0 10px;padding:0 2px;letter-spacing:.04em">更多智能体</div>

  <!-- 睡前故事 -->
  <div class="agent-card inactive" id="card-sleep">
    <div class="agent-icon" style="background:linear-gradient(135deg,#FCA5A5,#EF4444)">🌙</div>
    <div style="flex:1">
      <div style="font-size:15px;font-weight:700;color:var(--text-h)">睡前故事</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px">助眠类智能体 · 未开启</div>
    </div>
    <div class="agent-toggle off" onclick="toggleAgent(this)"></div>
  </div>

  <!-- 数学小达人 -->
  <div class="agent-card inactive" id="card-math">
    <div class="agent-icon" style="background:linear-gradient(135deg,#6EE7B7,#10B981)">🔢</div>
    <div style="flex:1">
      <div style="font-size:15px;font-weight:700;color:var(--text-h)">数学小达人</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:2px">学习类智能体 · 未开启</div>
    </div>
    <div class="agent-toggle off" onclick="toggleAgent(this)"></div>
  </div>

</div>

<!-- 底部固定按钮 -->
<div class="fixed-bottom">
  <button class="btn-new" onclick="openSheet('newSheet')">
    <i class="ph ph-plus-circle" style="font-size:18px"></i> 新建智能体
  </button>
  <button class="btn-redeem" onclick="openSheet('redeemSheet')">
    <i class="ph ph-gift" style="font-size:18px"></i> 兑换智能体
  </button>
</div>

<!-- ═══ 新建智能体弹窗 ═══ -->
<div class="sheet-overlay" id="newSheet" onclick="handleOverlay(event,'newSheet')">
  <div class="sheet">
    <div class="sheet-title">新建智能体</div>

    <div class="form-label" style="margin-bottom:6px">选择角色头像</div>
    <div class="emoji-picker" style="margin-bottom:16px">
      <div class="emoji-opt selected" onclick="selectEmoji(this)">🌟</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🦊</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🐼</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🦄</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🐉</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🚀</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🎵</div>
      <div class="emoji-opt" onclick="selectEmoji(this)">🌈</div>
    </div>

    <div class="form-label" style="margin-bottom:6px">智能体名称</div>
    <input type="text" class="form-input" id="newName" placeholder="给你的智能体起个名字" maxlength="12" style="margin-bottom:14px">

    <div class="form-label" style="margin-bottom:6px">智能体类型</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px" id="typeRow">
      <button class="sp-select-btn active" onclick="selectType(this)">陪伴</button>
      <button class="sp-select-btn" onclick="selectType(this)">学习</button>
      <button class="sp-select-btn" onclick="selectType(this)">创意</button>
      <button class="sp-select-btn" onclick="selectType(this)">助眠</button>
      <button class="sp-select-btn" onclick="selectType(this)">其他</button>
    </div>

    <div class="form-label" style="margin-bottom:6px">角色设定 <span style="font-weight:400;color:var(--text-muted)">(可选)</span></div>
    <textarea class="form-textarea" id="newPrompt" placeholder="描述这个智能体的性格、说话方式、擅长的话题…" style="margin-bottom:0"></textarea>

    <div class="sheet-btn-row">
      <button class="sheet-cancel" onclick="closeSheet('newSheet')">取消</button>
      <button class="sheet-confirm" onclick="confirmNew()">创建</button>
    </div>
  </div>
</div>

<!-- ═══ 兑换智能体弹窗 ═══ -->
<div class="sheet-overlay" id="redeemSheet" onclick="handleOverlay(event,'redeemSheet')">
  <div class="sheet">
    <div style="text-align:center;margin-bottom:20px">
      <div style="width:64px;height:64px;border-radius:20px;background:linear-gradient(135deg,#FFEDD5,#FED7AA);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 12px">🎁</div>
      <div class="sheet-title" style="margin-bottom:4px">兑换智能体</div>
      <div style="font-size:13px;color:var(--text-sub)">输入兑换码激活新的智能体角色</div>
    </div>

    <input type="text" id="redeemCode" placeholder="请输入兑换码" style="width:100%;padding:14px 16px;border:2px solid var(--border-light);border-radius:var(--r-lg);font-size:16px;text-align:center;letter-spacing:4px;font-family:var(--font-en);font-weight:700;box-sizing:border-box;outline:none;transition:.2s" onfocus="this.style.borderColor='var(--c-primary)'" onblur="this.style.borderColor='var(--border-light)'">

    <div style="font-size:11px;color:var(--text-muted);text-align:center;margin-top:8px;margin-bottom:4px">每个兑换码仅可使用一次</div>

    <div class="sheet-btn-row">
      <button class="sheet-cancel" onclick="closeSheet('redeemSheet')">取消</button>
      <button class="sheet-confirm" onclick="confirmRedeem()">立即兑换</button>
    </div>
  </div>
</div>

<script>
/* ── 开关切换 ── */
function toggleAgent(toggle) {
  var isOn = toggle.classList.contains('on');
  toggle.classList.toggle('on', !isOn);
  toggle.classList.toggle('off', isOn);
  toggle.closest('.agent-card').classList.toggle('inactive', isOn);
}

/* ── 弹窗开关 ── */
function openSheet(id) { document.getElementById(id).classList.add('show'); }
function closeSheet(id) { document.getElementById(id).classList.remove('show'); }
function handleOverlay(e, id) { if (e.target === document.getElementById(id)) closeSheet(id); }

/* ── Emoji 单选 ── */
function selectEmoji(el) {
  document.querySelectorAll('.emoji-opt').forEach(function(e){ e.classList.remove('selected'); });
  el.classList.add('selected');
}

/* ── 类型单选 ── */
function selectType(btn) {
  document.querySelectorAll('#typeRow .sp-select-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}

/* ── 确认新建 ── */
function confirmNew() {
  var name = document.getElementById('newName').value.trim();
  if (!name) { alert('请为智能体起个名字'); return; }
  closeSheet('newSheet');
  alert('「' + name + '」创建成功！\n可在列表中开启使用。');
}

/* ── 确认兑换 ── */
function confirmRedeem() {
  var code = document.getElementById('redeemCode').value.trim();
  if (!code) { alert('请输入兑换码'); return; }
  closeSheet('redeemSheet');
  alert('兑换码验证中…\n智能体将在验证成功后出现在列表中。');
}
</script>

</body>
</html>
