<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 我的资料</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
/* ── 头像区 ── */
.avatar-section{display:flex;flex-direction:column;align-items:center;padding:24px 0 20px;gap:12px}
.avatar-wrap{position:relative;cursor:pointer}
.avatar-circle{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#FB923C,#F97316);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:white;box-shadow:0 4px 20px rgba(249,115,22,.3)}
.avatar-edit-badge{position:absolute;bottom:0;right:0;width:26px;height:26px;border-radius:50%;background:var(--text-h);display:flex;align-items:center;justify-content:center;border:2px solid white}

/* ── 资料行 ── */
.info-card{background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:4px 0;margin-bottom:14px}
.info-row{display:flex;align-items:center;padding:13px 18px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:.1s}
.info-row:last-child{border-bottom:none}
.info-row:active{background:var(--bg-muted)}
.info-label{font-size:13px;color:var(--text-sub);flex-shrink:0;width:64px}
.info-value{flex:1;font-size:14px;color:var(--text-h);font-weight:500}
.info-arrow{color:var(--text-muted)}

/* ── 账户类型标签 ── */
.account-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:var(--r-full);font-size:11px;font-weight:600}
.account-apple{background:#F1F5F9;color:#1E293B}
.account-google{background:#FEF3C7;color:#92400E}

/* ── 昵称编辑弹窗 ── */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:none;align-items:flex-end;justify-content:center}
.sheet-overlay.show{display:flex}
.sheet{background:white;border-radius:var(--r-xl) var(--r-xl) 0 0;padding:20px 20px 36px;width:100%;max-width:480px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div style="display:flex;align-items:center;padding:8px 16px 12px">
  <a href="javascript:history.back()" style="width:36px;height:36px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center">
    <i class="ph ph-caret-left" style="font-size:20px;color:var(--text-h)"></i>
  </a>
  <div style="flex:1;text-align:center;font-size:17px;font-weight:700;color:var(--text-h)">我的资料</div>
  <div style="width:36px"></div>
</div>

<div class="page-content" style="padding-top:0">

  <!-- 头像 -->
  <div class="avatar-section">
    <div class="avatar-wrap" onclick="changeAvatar()">
      <div class="avatar-circle" id="avatarCircle">妈</div>
      <div class="avatar-edit-badge">
        <i class="ph ph-camera" style="font-size:13px;color:white"></i>
      </div>
    </div>
    <div style="font-size:12px;color:var(--text-muted)">点击更换头像</div>
  </div>

  <!-- 资料信息卡 -->
  <div class="info-card">

    <!-- 昵称 -->
    <div class="info-row" onclick="openNicknameEdit()">
      <div class="info-label">昵称</div>
      <div class="info-value" id="nicknameDisplay">晓梅</div>
      <i class="ph ph-caret-right" style="font-size:16px" class="info-arrow"></i>
    </div>

    <!-- 账户 -->
    <div class="info-row" style="cursor:default">
      <div class="info-label">账户</div>
      <div class="info-value">
        <span class="account-tag account-apple">
          <i class="ph ph-apple-logo" style="font-size:13px"></i> Apple 账户
        </span>
      </div>
      <span style="font-size:11px;color:var(--text-muted)">x***i@icloud.com</span>
    </div>

    <!-- 手机号 -->
    <div class="info-row" onclick="alert('修改手机号')">
      <div class="info-label">手机号</div>
      <div class="info-value">138****6789</div>
      <i class="ph ph-caret-right" style="font-size:16px;color:var(--text-muted)"></i>
    </div>

  </div>

  <!-- 角色信息（只读） -->
  <div class="info-card">
    <div class="info-row" style="cursor:default">
      <div class="info-label">家庭角色</div>
      <div class="info-value">妈妈（管理员）</div>
    </div>
    <div class="info-row" style="cursor:default">
      <div class="info-label">注册时间</div>
      <div class="info-value" style="font-family:var(--font-en);font-size:13px">2026-01-15</div>
    </div>
  </div>

</div>

<!-- 昵称编辑弹窗 -->
<div class="sheet-overlay" id="nicknameSheet" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <div style="font-size:16px;font-weight:800;color:var(--text-h);text-align:center;margin-bottom:20px">修改昵称</div>
    <input type="text" id="nicknameInput" maxlength="12" style="width:100%;padding:12px 14px;border:2px solid var(--c-primary);border-radius:var(--r-lg);font-size:16px;font-family:var(--font-cn);color:var(--text-h);outline:none;box-sizing:border-box;text-align:center">
    <div style="display:flex;gap:10px;margin-top:14px">
      <button onclick="closeSheet()" style="flex:1;padding:13px;border-radius:var(--r-lg);border:1.5px solid var(--border-light);background:white;color:var(--text-body);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-cn)">取消</button>
      <button onclick="saveNickname()" style="flex:2;padding:13px;border-radius:var(--r-lg);border:none;background:linear-gradient(135deg,var(--c-primary),#FB923C);color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-cn)">保存</button>
    </div>
  </div>
</div>

<script>
/* ── 更换头像 ── */
function changeAvatar() { alert('选择头像（相册 / 拍照）'); }

/* ── 修改昵称 ── */
function openNicknameEdit() {
  document.getElementById('nicknameInput').value = document.getElementById('nicknameDisplay').textContent;
  document.getElementById('nicknameSheet').classList.add('show');
  setTimeout(function(){ document.getElementById('nicknameInput').focus(); }, 300);
}
function closeSheet() { document.getElementById('nicknameSheet').classList.remove('show'); }
function saveNickname() {
  var val = document.getElementById('nicknameInput').value.trim();
  if (!val) { alert('昵称不能为空'); return; }
  document.getElementById('nicknameDisplay').textContent = val;
  closeSheet();
}
</script>

</body>
</html>
