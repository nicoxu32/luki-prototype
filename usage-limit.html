<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>luki · 使用限制</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="status-bar"><span class="s-time">9:41</span><div class="s-icons"><i class="fa fa-signal"></i><i class="fa fa-wifi"></i><i class="fa fa-battery-full"></i></div></div>
<div class="back-header">
  <a href="profile.html" class="back-btn"><i class="fa fa-chevron-left"></i></a>
  <div class="back-title">使用时间限制</div>
</div>
<div class="page-content">
  <div class="card">
    <div style="font-family:'Nunito','Inter',sans-serif;font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:12px">每日对话时间限制</div>
    <div style="text-align:center;margin-bottom:16px">
      <div style="font-family:'Nunito','Inter',sans-serif;font-size:48px;font-weight:900;color:var(--primary)">60</div>
      <div style="font-size:13px;color:var(--text-secondary)">分钟/天</div>
    </div>
    <input type="range" min="15" max="180" value="60" style="width:100%;accent-color:var(--primary)">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:4px"><span>15 min</span><span>3 hours</span></div>
    <div style="margin-top:12px;font-size:12px;color:var(--text-secondary);line-height:1.6">Today: Lily has used <strong style="color:var(--primary)">34 minutes</strong> of her 60-minute limit. 26 minutes remaining.</div>
    <div class="progress-bar" style="margin-top:8px"><div class="progress-fill" style="width:57%"></div></div>
  </div>
  <div class="card">
    <div style="font-family:'Nunito','Inter',sans-serif;font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:12px">Schedule</div>
    <div class="toggle-row">
      <div class="toggle-info"><div class="toggle-label">上学时间锁定</div><div class="toggle-desc">工作日上午 8 点至下午 3 点禁用 luki</div></div>
      <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <div class="toggle-info"><div class="toggle-label">就寝模式</div><div class="toggle-desc">晚上 9 点后进入安静模式</div></div>
      <label class="toggle"><input type="checkbox" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row" style="border-bottom:none">
      <div class="toggle-info"><div class="toggle-label">周末延长时间</div><div class="toggle-desc">周末允许使用 90 分钟</div></div>
      <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
    </div>
  </div>
  <button class="btn btn-primary btn-full">保存设置</button>
</div>
</body>
</html>
