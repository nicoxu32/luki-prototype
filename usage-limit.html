<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 使用时长控制</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
</head>
<body>
<div style="display:flex;align-items:center;padding:8px 16px 12px">
  <a href="javascript:history.back()" style="width:36px;height:36px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center">
    <i class="ph ph-caret-left" style="font-size:20px;color:var(--text-h)"></i>
  </a>
  <div style="flex:1;text-align:center;font-size:17px;font-weight:700;color:var(--text-h)">使用时长控制</div>
  <div style="width:36px"></div>
</div>
<div class="page-content" style="padding-top:0">

  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:20px;margin-bottom:14px;text-align:center">
    <div style="font-size:13px;color:var(--text-sub);margin-bottom:8px">今日已使用</div>
    <div style="font-size:36px;font-weight:900;color:var(--text-h);font-family:var(--font-en)">1:20</div>
    <div style="font-size:12px;color:var(--text-muted);margin-top:4px">每日限额 2 小时</div>
    <div style="height:8px;border-radius:4px;background:var(--bg-muted);margin-top:14px"><div style="width:67%;height:100%;border-radius:4px;background:linear-gradient(90deg,#F97316,#FB923C)"></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text-muted)"><span>0:00</span><span>2:00</span></div>
  </div>

  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:16px 18px;margin-bottom:12px">
    <div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:14px">时长设置</div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-light)"><span style="font-size:14px;color:var(--text-h)">每日使用上限</span><span style="font-size:14px;font-weight:700;color:var(--c-primary)">2 小时</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-light)"><span style="font-size:14px;color:var(--text-h)">单次对话上限</span><span style="font-size:14px;font-weight:700;color:var(--c-primary)">30 分钟</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0"><span style="font-size:14px;color:var(--text-h)">到时提醒方式</span><span style="font-size:14px;font-weight:700;color:var(--c-primary)">温柔提醒</span></div>
  </div>

</div>
</body>
</html>
