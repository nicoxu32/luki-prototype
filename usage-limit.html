<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 使用时长</title>
<link rel="stylesheet" href="style.css">
<script src='https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js'></script>
</head>
<body>
<div class="status-bar">
  <span style="font-weight:700;font-size:15px;font-family:var(--font-en)">9:41</span>
  <div class="s-icons">
    <i class="ph ph-cell-signal-full" style="font-size:16px"></i>
    <i class="ph ph-wifi-high" style="font-size:16px"></i>
    <i class="ph ph-battery-full" style="font-size:16px"></i>
  </div>
</div><div class="sub-header">
  <a href="profile.html" class="back-btn"><i class="ph ph-caret-left" style="font-size:20px"></i></a>
  <div class="sub-title">使用时长控制</div>
  <div style="width:36px"></div>
</div>
<div class="page-content">
  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:20px;margin-bottom:14px;text-align:center">
    <div style="width:120px;height:120px;border-radius:50%;background:conic-gradient(#F59E0B 0% 67%,#F3F2F0 67% 100%);display:flex;align-items:center;justify-content:center;margin:0 auto 12px">
      <div style="width:96px;height:96px;border-radius:50%;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div style="font-size:28px;font-weight:800;color:var(--text-h);font-family:var(--font-en);line-height:1">1:20</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">已使用</div>
      </div>
    </div>
    <div style="font-size:14px;font-weight:600;color:var(--text-h)">今日剩余 <span style="color:#F59E0B">40 分钟</span></div>
    <div style="font-size:12px;color:var(--text-muted);margin-top:4px">每日限额：2 小时</div>
  </div>
  <div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:10px">调整每日限额</div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button style="flex:1;padding:14px;border:1px solid var(--border-light);border-radius:var(--r-lg);background:var(--bg-card);font-size:14px;color:var(--text-sub);cursor:pointer;font-family:var(--font-cn)">1小时</button>
    <button style="flex:1;padding:14px;border:2px solid #F59E0B;border-radius:var(--r-lg);background:#FFFBEB;font-size:14px;color:#B45309;font-weight:700;cursor:pointer;font-family:var(--font-cn)">2小时</button>
    <button style="flex:1;padding:14px;border:1px solid var(--border-light);border-radius:var(--r-lg);background:var(--bg-card);font-size:14px;color:var(--text-sub);cursor:pointer;font-family:var(--font-cn)">不限制</button>
  </div>
</div>
</body></html>
