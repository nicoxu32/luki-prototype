<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 升级 Premium</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
/* ── 顶部导航栏 ── */
.sub-nav {
  display: flex;
  align-items: center;
  padding: 12px 16px 8px;
  background: rgba(248,247,245,.96);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-light);
  position: sticky;
  top: 0;
  z-index: 50;
}
.sub-nav-title {
  flex: 1;
  text-align: center;
  font-size: 17px;
  font-weight: 700;
  color: var(--text-h);
}

/* ── 主标题 ── */
.sub-headline {
  text-align: center;
  padding: 16px 16px 12px;
}
.sub-headline h1 {
  font-size: 21px;
  font-weight: 900;
  color: var(--text-h);
  line-height: 1.3;
  margin-bottom: 4px;
  letter-spacing: -.02em;
}
.sub-headline p {
  font-size: 13px;
  color: var(--text-muted);
}

/* ── 价值卖点（单张紧凑列表卡） ── */
.sub-features {
  background: var(--bg-card);
  border-radius: var(--r-xl);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border-light);
  padding: 4px 0;
  margin-bottom: 14px;
}
.sub-feat-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-light);
}
.sub-feat-row:last-child { border-bottom: none; }
.sub-feat-icon {
  width: 38px;
  height: 38px;
  border-radius: var(--r-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.sub-feat-text h3 {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-h);
  margin-bottom: 2px;
}
.sub-feat-text p {
  font-size: 11.5px;
  color: var(--text-muted);
  line-height: 1.45;
}

/* ── 定价标题 ── */
.sub-plan-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: .05em;
  margin-bottom: 10px;
}

/* ── 定价卡片 ── */
.sub-plans {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}
.sub-plan {
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-radius: var(--r-xl);
  padding: 14px 16px 12px;
  cursor: pointer;
  transition: var(--ease);
  position: relative;
  box-shadow: var(--shadow-xs);
}
.sub-plan:active { transform: scale(.99); }
.sub-plan.active {
  border: 2px solid var(--c-primary);
  background: linear-gradient(135deg, #FFF7ED, #FFFBF5);
  box-shadow: 0 4px 20px rgba(249,115,22,.14);
}
.sub-plan.dimmed { opacity: .5; }
/* 角标 */
.sub-plan-badge {
  position: absolute;
  top: -11px;
  right: 16px;
  background: linear-gradient(135deg, #EF4444, #DC2626);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 12px;
  border-radius: var(--r-full);
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(220,38,38,.3);
}
.sub-plan-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.sub-plan-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-h);
}
/* 选中圆圈 */
.sub-plan-radio {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: var(--ease);
}
.sub-plan.active .sub-plan-radio {
  border-color: var(--c-primary);
  background: var(--c-primary);
}
.sub-plan.active .sub-plan-radio::after {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: white;
}
/* 价格行 */
.sub-plan-price-row {
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.sub-plan-price {
  font-family: var(--font-en);
  font-size: 30px;
  font-weight: 800;
  color: var(--text-h);
  line-height: 1;
}
.sub-plan.active .sub-plan-price { color: var(--c-primary); }
.sub-plan-unit {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-muted);
}
.sub-plan-sub {
  font-size: 11.5px;
  color: var(--text-muted);
  margin-top: 4px;
}
.sub-plan.active .sub-plan-sub { color: #B45309; }

/* ── 固定底部 ── */
.sub-footer {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 390px;
  padding: 12px 16px 32px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border-light);
}
.sub-cta-btn {
  width: 100%;
  padding: 16px;
  border-radius: var(--r-xl);
  border: none;
  background: linear-gradient(135deg, #F97316, #FB923C);
  color: white;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font-cn);
  margin-bottom: 8px;
  box-shadow: 0 4px 20px rgba(249,115,22,.38);
  transition: var(--ease);
}
.sub-cta-btn:active { transform: scale(.99); }
.sub-micro {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.sub-links {
  display: flex;
  justify-content: center;
  gap: 20px;
}
.sub-links a {
  font-size: 11px;
  color: var(--text-muted);
  text-decoration: underline;
}
</style>
</head>
<body>

<!-- 顶部导航栏 -->
<div class="sub-nav">
  <a href="javascript:history.back()" class="back-btn">
    <i class="ph ph-caret-left" style="font-size:18px"></i>
  </a>
  <div class="sub-nav-title">解锁 luki Premium</div>
  <div style="width:36px"></div>
</div>


<!-- ── 主内容区 ── -->
<div class="page-content" style="padding-bottom:160px">

  <!-- 页顶副标题 -->
  <div style="text-align:center;font-size:13px;color:var(--text-muted);padding:4px 0 14px">永久珍藏孩子的每个珍贵瞬间</div>

  <!-- 三大价值卖点（单卡紧凑列表） -->
  <div class="sub-features anim-in">

    <div class="sub-feat-row">
      <div class="sub-feat-icon" style="background:#FFF3E0">📊</div>
      <div class="sub-feat-text">
        <h3>最近 30 天情绪报告</h3>
        <p>解锁完整 30 天情绪数据，全面了解孩子的情绪变化趋势</p>
      </div>
    </div>

    <div class="sub-feat-row">
      <div class="sub-feat-icon" style="background:#F3EFFE">🗂️</div>
      <div class="sub-feat-text">
        <h3>全部历史数据报告</h3>
        <p>查看孩子从入档以来的完整成长记录与情绪基线分析</p>
      </div>
    </div>

    <div class="sub-feat-row">
      <div class="sub-feat-icon" style="background:#EFF6FF">🤖</div>
      <div class="sub-feat-text">
        <h3>AI 个性化育儿建议</h3>
        <p>基于孩子专属数据生成个性化育儿策略，更懂你的孩子</p>
      </div>
    </div>

    <div class="sub-feat-row" style="opacity:.6">
      <div class="sub-feat-icon" style="background:#F3F4F6">···</div>
      <div class="sub-feat-text">
        <h3>其他权益</h3>
        <p>更多功能持续开发中，敬请期待</p>
      </div>
    </div>

  </div>

  <!-- 定价方案 -->
  <div class="sub-plan-label">选择订阅方案</div>
  <div class="sub-plans">

    <!-- 年度订阅（主推，默认选中） -->
    <div class="sub-plan active" id="plan-year" onclick="selectPlan('year')">
      <div class="sub-plan-badge">🔥 最受欢迎 · 省 27%</div>
      <div class="sub-plan-row">
        <span class="sub-plan-name">按年订阅</span>
        <div class="sub-plan-radio"></div>
      </div>
      <div class="sub-plan-price-row">
        <span class="sub-plan-price">$348</span>
        <span class="sub-plan-unit">/年</span>
        <span class="sub-plan-sub" style="margin-top:0;margin-left:6px">折合 $29/月</span>
      </div>
    </div>

    <!-- 月度订阅（高价锚点，视觉置灰） -->
    <div class="sub-plan dimmed" id="plan-month" onclick="selectPlan('month')">
      <div class="sub-plan-row">
        <span class="sub-plan-name">按月订阅</span>
        <div class="sub-plan-radio"></div>
      </div>
      <div class="sub-plan-price-row">
        <span class="sub-plan-price">$39.9</span>
        <span class="sub-plan-unit">/月</span>
        <span class="sub-plan-sub" style="margin-top:0;margin-left:6px">随时取消</span>
      </div>
    </div>

  </div>

</div>

<!-- ── 固定底部操作区 ── -->
<div class="sub-footer">
  <button class="sub-cta-btn" id="subBtn" onclick="doSubscribe()">
    订阅
  </button>
  <div class="sub-links">
    <a href="#">隐私政策</a>
    <a href="#">服务协议</a>
  </div>
</div>

<script>
/* 月度/年度两档配置 */
var plans = {
  year:  { btn: '订阅', confirm: '确认按年订阅 $348/年？\n订阅后将自动续费，可随时在 App Store 中取消。' },
  month: { btn: '订阅', confirm: '确认按月订阅 $39.9/月？\n订阅后将自动续费，可随时在 App Store 中取消。' }
};
var currentPlan = 'year';

/* 切换订阅方案 */
function selectPlan(plan) {
  currentPlan = plan;
  /* 重置所有方案样式 */
  ['year', 'month'].forEach(function(p) {
    var el = document.getElementById('plan-' + p);
    el.classList.remove('active');
    /* 月度默认置灰，被选中后恢复 */
    if (p === 'month') el.classList.add('dimmed');
  });
  var selected = document.getElementById('plan-' + plan);
  selected.classList.add('active');
  selected.classList.remove('dimmed');
  /* 月度未选中时保持置灰 */
  if (plan === 'year') {
    document.getElementById('plan-month').classList.add('dimmed');
  } else {
    document.getElementById('plan-year').classList.add('dimmed');
  }
  document.getElementById('subBtn').textContent = plans[plan].btn;
}

/* 点击订阅 */
function doSubscribe() {
  if (confirm(plans[currentPlan].confirm)) {
    alert('订阅成功！欢迎加入 luki Premium 大家庭 🎉');
  }
}
</script>

</body>
</html>
