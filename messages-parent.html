<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 历史留言</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
.msg-flow-card{background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);border-left:3px solid var(--c-violet);padding:16px 18px;margin-bottom:10px}
.msg-heal-title{font-size:15px;font-weight:700;color:var(--text-h);line-height:1.5;margin-bottom:8px}
.msg-meta{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--text-muted);margin-bottom:10px}
.msg-meta i{vertical-align:-1px}
.msg-audio-bar{display:flex;align-items:center;gap:10px;background:var(--bg-muted);border-radius:var(--r-full);padding:8px 14px}
.msg-audio-play{width:32px;height:32px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;color:white;cursor:pointer;flex-shrink:0;background:var(--c-violet);box-shadow:0 2px 8px rgba(139,92,246,.3)}
.msg-audio-wave{flex:1;height:4px;border-radius:2px;background:var(--border)}
.msg-audio-dur{font-size:11px;font-family:var(--font-en);color:var(--text-muted);flex-shrink:0}
.msg-reply-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:var(--r-full);background:var(--c-violet-light);color:#6D28D9;font-size:13px;font-weight:600;text-decoration:none;margin-top:10px}
</style>
</head>
<body>
<div style="display:flex;align-items:center;padding:8px 16px 12px">
  <a href="javascript:history.back()" style="width:36px;height:36px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center">
    <i class="ph ph-caret-left" style="font-size:20px;color:var(--text-h)"></i>
  </a>
  <div style="flex:1;text-align:center;font-size:17px;font-weight:700;color:var(--text-h)">历史留言</div>
  <div style="width:36px"></div>
</div>
<div class="page-content" style="padding-top:0">

  <!-- 今天 -->
  <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin:8px 0 10px;padding:0 2px">今天</div>

  <div class="msg-flow-card">
    <div class="msg-meta" style="margin-bottom:8px">
      <span><i class="ph ph-clock" style="font-size:13px"></i> 10:15</span>
      <span style="font-weight:600;color:var(--c-violet)"><i class="ph ph-envelope-simple" style="font-size:13px"></i> 小莉的留言</span>
    </div>
    <div class="msg-heal-title">「每一句留言，都是爱的小纸条」</div>
    <div class="msg-audio-bar">
      <button class="msg-audio-play" onclick="this.querySelector('i').classList.toggle('ph-play-fill');this.querySelector('i').classList.toggle('ph-pause-fill')"><i class="ph ph-play-fill" style="font-size:14px"></i></button>
      <div class="msg-audio-wave" style="background:linear-gradient(to right,#C4B5FD 38%,var(--border) 38%)"></div>
      <span class="msg-audio-dur">0:18</span>
    </div>
    <a href="moments.html" class="msg-reply-btn"><i class="ph ph-arrow-bend-up-left"></i> 回复留言</a>
  </div>

  <div class="msg-flow-card">
    <div class="msg-meta" style="margin-bottom:8px">
      <span><i class="ph ph-clock" style="font-size:13px"></i> 17:50</span>
      <span style="font-weight:600;color:var(--c-violet)"><i class="ph ph-envelope-simple" style="font-size:13px"></i> luki 的留言</span>
    </div>
    <div class="msg-heal-title">「小莉今天的笑声特别多呢」</div>
    <div class="msg-audio-bar">
      <button class="msg-audio-play" onclick="this.querySelector('i').classList.toggle('ph-play-fill');this.querySelector('i').classList.toggle('ph-pause-fill')"><i class="ph ph-play-fill" style="font-size:14px"></i></button>
      <div class="msg-audio-wave" style="background:linear-gradient(to right,#C4B5FD 25%,var(--border) 25%)"></div>
      <span class="msg-audio-dur">0:32</span>
    </div>
  </div>

  <!-- 昨天 -->
  <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin:16px 0 10px;padding:0 2px">昨天</div>

  <div class="msg-flow-card">
    <div class="msg-meta" style="margin-bottom:8px">
      <span><i class="ph ph-clock" style="font-size:13px"></i> 19:30</span>
      <span style="font-weight:600;color:var(--c-violet)"><i class="ph ph-envelope-simple" style="font-size:13px"></i> 爸爸的留言</span>
    </div>
    <div class="msg-heal-title">「爸爸出差也想着你哦」</div>
    <div class="msg-audio-bar">
      <button class="msg-audio-play" onclick="this.querySelector('i').classList.toggle('ph-play-fill');this.querySelector('i').classList.toggle('ph-pause-fill')"><i class="ph ph-play-fill" style="font-size:14px"></i></button>
      <div class="msg-audio-wave" style="background:linear-gradient(to right,#C4B5FD 60%,var(--border) 60%)"></div>
      <span class="msg-audio-dur">0:12</span>
    </div>
  </div>

  <div class="msg-flow-card">
    <div class="msg-meta" style="margin-bottom:8px">
      <span><i class="ph ph-clock" style="font-size:13px"></i> 08:20</span>
      <span style="font-weight:600;color:var(--c-violet)"><i class="ph ph-envelope-simple" style="font-size:13px"></i> 妈妈的留言</span>
    </div>
    <div class="msg-heal-title">「今天在学校要开心哦，妈妈爱你」</div>
    <div class="msg-audio-bar">
      <button class="msg-audio-play" onclick="this.querySelector('i').classList.toggle('ph-play-fill');this.querySelector('i').classList.toggle('ph-pause-fill')"><i class="ph ph-play-fill" style="font-size:14px"></i></button>
      <div class="msg-audio-wave" style="background:linear-gradient(to right,#C4B5FD 50%,var(--border) 50%)"></div>
      <span class="msg-audio-dur">0:22</span>
    </div>
  </div>

  <!-- 3月30日 -->
  <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin:16px 0 10px;padding:0 2px">3月30日</div>

  <div class="msg-flow-card">
    <div class="msg-meta" style="margin-bottom:8px">
      <span><i class="ph ph-clock" style="font-size:13px"></i> 20:15</span>
      <span style="font-weight:600;color:var(--c-violet)"><i class="ph ph-envelope-simple" style="font-size:13px"></i> 小莉的留言</span>
    </div>
    <div class="msg-heal-title">「妈妈我今天画了一只恐龙送给你！」</div>
    <div class="msg-audio-bar">
      <button class="msg-audio-play" onclick="this.querySelector('i').classList.toggle('ph-play-fill');this.querySelector('i').classList.toggle('ph-pause-fill')"><i class="ph ph-play-fill" style="font-size:14px"></i></button>
      <div class="msg-audio-wave" style="background:linear-gradient(to right,#C4B5FD 45%,var(--border) 45%)"></div>
      <span class="msg-audio-dur">0:15</span>
    </div>
    <a href="moments.html" class="msg-reply-btn"><i class="ph ph-arrow-bend-up-left"></i> 回复留言</a>
  </div>

</div>
</body>
</html>
