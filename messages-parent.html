<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 家长消息</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>

</head>
<body>
<div class="status-bar">
  <span style="font-weight:700;font-size:15px;font-family:'DM Sans',sans-serif">9:41</span>
  <div class="s-icons">
    <i class="ph ph-cell-signal-full" style="font-size:16px"></i>
    <i class="ph ph-wifi-high" style="font-size:16px"></i>
    <i class="ph ph-battery-full" style="font-size:16px"></i>
  </div>
</div><div class="back-header">
  <a href="profile.html" class="back-btn"><i class="ph ph-arrow-left" style="font-size:18px"></i></a>
  <div class="back-title">消息中心</div>
  <div></div>
</div>
<div class="page-content">
  <div class="seg">
    <button class="seg-btn active">全部</button>
    <button class="seg-btn">luki 通知</button>
    <button class="seg-btn">系统消息</button>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:16px 18px;display:flex;gap:12px;align-items:flex-start">
      <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#BFDBFE,#93C5FD);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🤖</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:13px;font-weight:700;color:#1D4ED8">luki 通知</span>
          <span style="font-size:11px;color:var(--text-muted);font-family:'DM Sans',sans-serif">15:42</span>
        </div>
        <div style="font-size:13px;color:var(--text-h);line-height:1.6">小莉今天完成了英语自我介绍里程碑！</div>
      </div>
      <span style="width:8px;height:8px;border-radius:50%;background:var(--c-primary);flex-shrink:0;margin-top:4px"></span>
    </div>
    <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:16px 18px;display:flex;gap:12px;align-items:flex-start">
      <div style="width:40px;height:40px;border-radius:50%;background:#FEF9C3;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">⚠️</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:13px;font-weight:700;color:#92400E">情绪预警</span>
          <span style="font-size:11px;color:var(--text-muted);font-family:'DM Sans',sans-serif">9:10</span>
        </div>
        <div style="font-size:13px;color:var(--text-h);line-height:1.6">小莉今天早上情绪轻微低落，建议给予更多鼓励。</div>
      </div>
      <span style="width:8px;height:8px;border-radius:50%;background:var(--c-primary);flex-shrink:0;margin-top:4px"></span>
    </div>
    <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:16px 18px;display:flex;gap:12px;align-items:flex-start;opacity:.7">
      <div style="width:40px;height:40px;border-radius:50%;background:#F3F2F0;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">📊</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:13px;font-weight:700;color:var(--text-h)">周报已生成</span>
          <span style="font-size:11px;color:var(--text-muted);font-family:'DM Sans',sans-serif">昨日</span>
        </div>
        <div style="font-size:13px;color:var(--text-sub);line-height:1.6">小莉上周的成长周报已生成，点击查看详情。</div>
      </div>
    </div>
    <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:16px 18px;display:flex;gap:12px;align-items:flex-start;opacity:.7">
      <div style="width:40px;height:40px;border-radius:50%;background:#F3F2F0;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🎉</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:13px;font-weight:700;color:var(--text-h)">系统通知</span>
          <span style="font-size:11px;color:var(--text-muted);font-family:'DM Sans',sans-serif">3天前</span>
        </div>
        <div style="font-size:13px;color:var(--text-sub);line-height:1.6">luki 已更新至 v2.4.1，新增情绪热力图功能。</div>
      </div>
    </div>
  </div>
</div>
</body></html>
