<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>luki · Parent Messages</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="status-bar"><span class="s-time">9:41</span><div class="s-icons"><i class="fa fa-signal"></i><i class="fa fa-wifi"></i><i class="fa fa-battery-full"></i></div></div>
<div class="back-header">
  <a href="index.html" class="back-btn"><i class="fa fa-chevron-left"></i></a>
  <div class="back-title">Messages</div>
  <a href="send-message.html" class="back-right"><i class="fa fa-pen-to-square"></i></a>
</div>
<div class="page-content">
  <!-- Message Threads -->
  <div class="menu-list">
    <a href="send-message.html" class="menu-item">
      <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#FFB89A,var(--primary));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:18px;flex-shrink:0">L</div>
      <div class="menu-text">
        <div class="menu-title">Lily</div>
        <div class="menu-subtitle">"Yes! I had apple slices and peanut butter 😋"</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div style="font-size:10px;color:var(--text-muted)">8:15 AM</div>
        <div style="width:18px;height:18px;border-radius:50%;background:var(--primary);color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center">1</div>
      </div>
    </a>
    <div class="menu-item" style="border-bottom:none;opacity:.5">
      <div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--luki-blue),#7AAFF5);display:flex;align-items:center;justify-content:center;color:white;font-size:18px;flex-shrink:0"><i class="fa fa-robot"></i></div>
      <div class="menu-text">
        <div class="menu-title">luki System</div>
        <div class="menu-subtitle">Safety alerts and device notifications</div>
      </div>
      <div style="font-size:10px;color:var(--text-muted)">Yesterday</div>
    </div>
  </div>
  <div style="text-align:center;padding:24px;color:var(--text-muted);font-size:13px">
    <i class="fa fa-paper-plane" style="font-size:32px;margin-bottom:12px;display:block;color:var(--border)"></i>
    Send Lily a voice message, text, or song — luki will deliver it!
    <div style="margin-top:12px"><a href="send-message.html" class="btn btn-primary" style="display:inline-flex"><i class="fa fa-plus"></i> New Message</a></div>
  </div>
</div>

</html>
