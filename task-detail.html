<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 任务详情</title>
<link rel="stylesheet" href="style.css">
<script src='https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js'></script>
</head>
<body>
<div class="status-bar">
  <span style="font-weight:700;font-size:15px;font-family:var(--font-en)">9:41</span>
  <div class="s-icons">
    <i class="ph ph-cell-signal-full" style="font-size:16px"></i>
    <i class="ph ph-wifi-high" style="font-size:16px"></i>
    <i class="ph ph-battery-full" style="font-size:16px"></i>
  </div>
</div><div class="sub-header">
  <a href="index.html" class="back-btn"><i class="ph ph-caret-left" style="font-size:20px"></i></a>
  <div class="sub-title">今日小任务</div>
  <div style="width:36px"></div>
</div>
<div class="page-content">
  <div class="task-card" style="position:relative">
    <div style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:72px;opacity:.15;pointer-events:none;line-height:1">🦕</div>
    <div class="task-label">今日小任务</div>
    <div class="task-title">和小莉一起画一只恐龙</div>
    <div class="task-desc">小莉今天和创意伙伴聊了很多关于恐龙的话题，她特别想画一只会飞的恐龙。试着和她一起画吧！</div>
  </div>
  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:18px;margin-bottom:14px">
    <div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:10px">📝 记录你的完成情况</div>
    <textarea style="width:100%;height:100px;border:1px solid var(--border-light);border-radius:var(--r-md);padding:12px;font-size:13px;font-family:var(--font-cn);resize:none;background:var(--bg-muted)" placeholder="写下你和小莉的互动感受..."></textarea>
    <div style="display:flex;gap:10px;margin-top:10px">
      <button style="flex:1;padding:10px;border:1px dashed var(--border-light);border-radius:var(--r-md);background:var(--bg-muted);font-size:13px;color:var(--text-muted);cursor:pointer;font-family:var(--font-cn)"><i class="ph ph-camera" style="font-size:16px"></i> 拍照</button>
      <button style="flex:1;padding:10px;border:1px dashed var(--border-light);border-radius:var(--r-md);background:var(--bg-muted);font-size:13px;color:var(--text-muted);cursor:pointer;font-family:var(--font-cn)"><i class="ph ph-microphone" style="font-size:16px"></i> 录音</button>
    </div>
    <button style="width:100%;margin-top:12px;padding:14px;background:var(--c-primary);color:white;border:none;border-radius:var(--r-lg);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-cn)" onclick="alert('已记录！谢谢你的用心陪伴 💛')">完成记录</button>
  </div>
</div>
</body></html>
