<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 任务详情</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>

</head>
<body>
<div class="status-bar">
  <span style="font-weight:700;font-size:15px;font-family:'DM Sans',sans-serif">9:41</span>
  <div class="s-icons">
    <i class="ph ph-cell-signal-full" style="font-size:16px"></i>
    <i class="ph ph-wifi-high" style="font-size:16px"></i>
    <i class="ph ph-battery-full" style="font-size:16px"></i>
  </div>
</div><div class="back-header">
  <a href="index.html" class="back-btn"><i class="ph ph-arrow-left" style="font-size:18px"></i></a>
  <div class="back-title">今日小任务</div>
  <div></div>
</div>
<div class="page-content">
  <div style="background:linear-gradient(135deg,#F97316,#FB923C);border-radius:var(--r-xl);padding:24px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:0 6px 20px rgba(249,115,22,.28)">
    <div style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:80px;opacity:.15;pointer-events:none">🦕</div>
    <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px">今日小任务</div>
    <div style="font-size:20px;font-weight:800;color:white;line-height:1.35;margin-bottom:8px">用三句话描述你最喜欢的恐龙</div>
    <div style="font-size:13px;color:rgba(255,255,255,.8);line-height:1.6">和 luki 分享你对恐龙的了解，说说它的名字、特点和你为什么喜欢它！</div>
  </div>
  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:20px;margin-bottom:16px">
    <div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:12px">任务提示</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;gap:10px;align-items:flex-start"><div style="width:24px;height:24px;border-radius:50%;background:#FFEDD5;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#F97316;flex-shrink:0">1</div><div style="font-size:13px;color:var(--text-sub);line-height:1.6">说出恐龙的名字，比如"霸王龙"或"三角龙"</div></div>
      <div style="display:flex;gap:10px;align-items:flex-start"><div style="width:24px;height:24px;border-radius:50%;background:#FFEDD5;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#F97316;flex-shrink:0">2</div><div style="font-size:13px;color:var(--text-sub);line-height:1.6">描述它最特别的地方，比如它的牙齿、角或者速度</div></div>
      <div style="display:flex;gap:10px;align-items:flex-start"><div style="width:24px;height:24px;border-radius:50%;background:#FFEDD5;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#F97316;flex-shrink:0">3</div><div style="font-size:13px;color:var(--text-sub);line-height:1.6">告诉 luki 你为什么喜欢它！</div></div>
    </div>
  </div>
  <a href="send-message.html" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px;background:var(--c-primary);color:white;border-radius:var(--r-full);font-size:16px;font-weight:700;box-shadow:0 4px 16px rgba(249,115,22,.3);text-decoration:none">
    <i class="ph ph-pencil-simple" style="font-size:20px"></i> 开始记录
  </a>
</div>
</body></html>
