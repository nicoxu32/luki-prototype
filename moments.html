<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 时光机</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
/* ── 留言卡片（沿用 Tab1 留言卡样式） ── */
.msg-flow-card{background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);border-left:3px solid var(--c-violet);padding:16px 18px;margin-bottom:10px}
.msg-heal-title{font-size:15px;font-weight:700;color:var(--text-h);line-height:1.5;margin-bottom:8px}
.msg-summary{font-size:13px;color:var(--text-sub);line-height:1.6;margin-bottom:10px}
.msg-meta{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--text-muted);margin-bottom:10px}
.msg-meta i{vertical-align:-1px}
.msg-audio-bar{display:flex;align-items:center;gap:10px;background:var(--bg-muted);border-radius:var(--r-full);padding:8px 14px}
.msg-audio-play{width:32px;height:32px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;color:white;cursor:pointer;flex-shrink:0;background:var(--c-violet);box-shadow:0 2px 8px rgba(139,92,246,.3)}
.msg-audio-wave{flex:1;height:4px;border-radius:2px;background:var(--border)}
.msg-audio-dur{font-size:11px;font-family:var(--font-en);color:var(--text-muted);flex-shrink:0}
.msg-reply-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:var(--r-full);background:var(--c-violet-light);color:#6D28D9;font-size:13px;font-weight:600;text-decoration:none;margin-top:10px}

/* ── 亲子时光任务 ── */
.task-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-light)}
.task-item:last-child{border-bottom:none}
.task-icon-placeholder{width:40px;height:40px;border-radius:var(--r-md);background:var(--bg-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:var(--text-muted)}
.task-text{flex:1}
.task-text-title{font-size:13px;font-weight:600;color:var(--text-h)}
.task-text-desc{font-size:12px;color:var(--text-muted);margin-top:2px}

/* ── 记录亲子时光按钮 ── */
.record-moment-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:24px 16px;background:var(--bg-card);border-radius:var(--r-xl);border:2px dashed var(--border);margin-top:12px;cursor:pointer;transition:.15s}
.record-moment-btn:active{transform:scale(.98)}
.record-moment-icon{width:40px;height:40px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.record-moment-title{font-size:14px;font-weight:600;color:var(--text-h);margin-bottom:4px}
.record-moment-desc{font-size:12px;color:var(--text-muted)}

/* ── 时光回忆录卡片（深色风格） ── */
.memory-dark-card{background:#2C2C2E;border-radius:var(--r-xl);padding:18px;margin-bottom:12px;color:white;position:relative;overflow:hidden}
.memory-dark-type{font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--r-full);display:inline-block;margin-bottom:8px}
.memory-dark-type.monthly{background:rgba(255,193,7,.2);color:#FFD54F}
.memory-dark-type.highlight{background:rgba(255,235,59,.15);color:#FFF176}
.memory-dark-type.offline{background:rgba(76,175,80,.2);color:#81C784}
.memory-dark-type.letter{background:rgba(186,104,200,.2);color:#CE93D8}
.memory-dark-title{font-size:16px;font-weight:800;margin-bottom:6px;line-height:1.4}
.memory-dark-stats{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:14px}
.memory-dark-cover{width:100%;height:100px;background:#3A3A3C;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(255,255,255,.35);margin-bottom:12px}
.memory-dark-audio{display:flex;align-items:center;gap:10px;background:#3A3A3C;border-radius:var(--r-full);padding:10px 14px;margin-bottom:10px}
.memory-dark-play{width:36px;height:36px;border-radius:50%;background:#FFC107;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#2C2C2E}
.memory-dark-wave{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.15)}
.memory-dark-wave-fill{height:100%;border-radius:2px;background:rgba(255,255,255,.4)}
.memory-dark-dur{font-size:12px;font-family:var(--font-en);color:rgba(255,255,255,.5);flex-shrink:0}
.memory-dark-premium{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:#FFC107;justify-content:flex-end;margin-top:6px}
.memory-dark-desc{font-size:13px;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:10px}
.memory-dark-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.memory-dark-chip{font-size:10px;padding:3px 10px;border-radius:var(--r-full);background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}

/* ── 留言长按钮 ── */
.leave-msg-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:linear-gradient(135deg,#AB47BC,#7E57C2);border-radius:var(--r-xl);color:white;font-size:15px;font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(126,87,194,.3);margin-top:12px;margin-bottom:16px;transition:.15s;font-family:var(--font-cn)}
.leave-msg-btn:active{transform:scale(.97)}
</style>
</head>
<body>

<!-- 指令1：页顶标题仅展示"时光机"，沿用现有颜色 -->
<div style="padding:12px 20px 4px;text-align:center">
  <div style="font-size:22px;font-weight:900;color:var(--text-h);letter-spacing:-.02em"><span style="color:var(--c-primary)">时光</span>机</div>
</div>

<div class="page-content" style="padding-top:8px">

  <!-- 时光机功能敬请期待 -->
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center">
    <div style="font-size:56px;margin-bottom:20px">⏳</div>
    <div style="font-size:20px;font-weight:800;color:var(--text-h);margin-bottom:10px">敬请期待</div>
    <div style="font-size:14px;color:var(--text-muted);line-height:1.7">时光机功能正在开发中，<br>即将与您见面。</div>
  </div>

</div>

<!-- Tab Bar（与其他页面保持一致） -->
<nav class="tab-bar">
  <a href="index.html" class="tab-item"><div class="tab-icon-wrap"><i class="ph ph-sun-horizon" style="font-size:22px;color:var(--text-muted)"></i></div><span class="tab-label">今日动态</span></a>
  <a href="growth.html" class="tab-item"><div class="tab-icon-wrap"><i class="ph ph-chart-line-up" style="font-size:22px;color:var(--text-muted)"></i></div><span class="tab-label">成长趋势</span></a>
  <a href="moments.html" class="tab-item active"><div class="tab-icon-wrap"><i class="ph-fill ph-clock-countdown" style="font-size:22px;color:var(--c-primary)"></i></div><span class="tab-label" style="color:var(--c-primary)">时光机</span></a>
  <a href="profile.html" class="tab-item"><div class="tab-icon-wrap"><i class="ph ph-user-circle" style="font-size:22px;color:var(--text-muted)"></i></div><span class="tab-label">我的</span></a>
</nav>

</body>
</html>
