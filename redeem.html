<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 智能体兑换</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
</head>
<body>
<div style="display:flex;align-items:center;padding:8px 16px 12px">
  <a href="javascript:history.back()" style="width:36px;height:36px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center">
    <i class="ph ph-caret-left" style="font-size:20px;color:var(--text-h)"></i>
  </a>
  <div style="flex:1;text-align:center;font-size:17px;font-weight:700;color:var(--text-h)">智能体兑换</div>
  <div style="width:36px"></div>
</div>
<div class="page-content" style="padding-top:0">

  <div style="text-align:center;padding:30px 20px">
    <div style="width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,#FFEDD5,#FED7AA);display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px">🎁</div>
    <div style="font-size:18px;font-weight:800;color:var(--text-h);margin-bottom:6px">输入兑换码</div>
    <div style="font-size:13px;color:var(--text-sub)">激活新的智能体角色</div>
  </div>

  <div style="padding:0 20px">
    <input type="text" placeholder="请输入兑换码" style="width:100%;padding:14px 16px;border:2px solid var(--border-light);border-radius:var(--r-lg);font-size:16px;text-align:center;letter-spacing:4px;font-family:var(--font-en);font-weight:700;box-sizing:border-box;outline:none;transition:.2s" onfocus="this.style.borderColor='var(--c-primary)'" onblur="this.style.borderColor='var(--border-light)'">
    <button onclick="alert('兑换码验证中…')" style="width:100%;margin-top:14px;padding:14px;border:none;border-radius:var(--r-lg);background:linear-gradient(135deg,var(--c-primary),#FB923C);color:white;font-size:16px;font-weight:700;cursor:pointer">立即兑换</button>
  </div>

</div>
</body>
</html>
