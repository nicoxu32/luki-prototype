<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 智能体兑换</title>
<link rel="stylesheet" href="style.css">
<script src='https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js'></script>
</head>
<body>
<div class="status-bar">
  <span style="font-weight:700;font-size:15px;font-family:var(--font-en)">9:41</span>
  <div class="s-icons">
    <i class="ph ph-cell-signal-full" style="font-size:16px"></i>
    <i class="ph ph-wifi-high" style="font-size:16px"></i>
    <i class="ph ph-battery-full" style="font-size:16px"></i>
  </div>
</div><div class="sub-header">
  <a href="profile.html" class="back-btn"><i class="ph ph-caret-left" style="font-size:20px"></i></a>
  <div class="sub-title">智能体兑换</div>
  <div style="width:36px"></div>
</div>
<div class="page-content">
  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:20px;margin-bottom:14px;text-align:center">
    <div style="font-size:48px;margin-bottom:12px">🎁</div>
    <div style="font-size:16px;font-weight:700;color:var(--text-h);margin-bottom:6px">输入兑换码</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">激活新的智能体或高级功能</div>
    <input type="text" style="width:100%;padding:14px;border:2px solid var(--border-light);border-radius:var(--r-lg);font-size:16px;font-family:var(--font-en);text-align:center;letter-spacing:4px;background:var(--bg-muted)" placeholder="XXXX-XXXX-XXXX">
    <button style="width:100%;margin-top:12px;padding:14px;background:var(--c-primary);color:white;border:none;border-radius:var(--r-lg);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-cn)" onclick="alert('兑换成功！🎉')">兑换</button>
  </div>
  <div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:10px">已拥有的智能体</div>
  <div class="menu-list">
    <div class="menu-item"><div style="width:36px;height:36px;border-radius:var(--r-sm);background:linear-gradient(135deg,#DBEAFE,#BFDBFE);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🎓</div><div class="menu-text"><div class="menu-title">英语小教练</div><div class="menu-sub">预设 · 已激活</div></div></div>
    <div class="menu-item"><div style="width:36px;height:36px;border-radius:var(--r-sm);background:linear-gradient(135deg,#DCFCE7,#BBF7D0);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🌳</div><div class="menu-text"><div class="menu-title">树洞</div><div class="menu-sub">预设 · 已激活</div></div></div>
    <div class="menu-item"><div style="width:36px;height:36px;border-radius:var(--r-sm);background:linear-gradient(135deg,#EDE9FE,#DDD6FE);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🎨</div><div class="menu-text"><div class="menu-title">创意伙伴</div><div class="menu-sub">预设 · 已激活</div></div></div>
  </div>
</div>
