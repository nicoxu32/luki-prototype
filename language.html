<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>luki · Language</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="status-bar"><span class="s-time">9:41</span><div class="s-icons"><i class="fa fa-signal"></i><i class="fa fa-wifi"></i><i class="fa fa-battery-full"></i></div></div>
<div class="back-header">
  <a href="profile.html" class="back-btn"><i class="fa fa-chevron-left"></i></a>
  <div class="back-title">Language &amp; Region</div>
</div>
<div class="page-content">
  <div style="font-family:'Nunito','Inter',sans-serif;font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:10px">App Language</div>
  <div class="menu-list" style="margin-bottom:16px">
    <div class="menu-item" style="background:var(--primary-light)">
      <div style="font-size:20px;flex-shrink:0">🇺🇸</div>
      <div class="menu-text"><div class="menu-title">English (US)</div></div>
      <i class="fa fa-check-circle" style="color:var(--primary);font-size:18px"></i>
    </div>
    <div class="menu-item"><div style="font-size:20px;flex-shrink:0">🇬🇧</div><div class="menu-text"><div class="menu-title">English (UK)</div></div></div>
    <div class="menu-item"><div style="font-size:20px;flex-shrink:0">🇨🇳</div><div class="menu-text"><div class="menu-title">中文 (简体)</div></div></div>
    <div class="menu-item"><div style="font-size:20px;flex-shrink:0">🇯🇵</div><div class="menu-text"><div class="menu-title">日本語</div></div></div>
    <div class="menu-item" style="border-bottom:none"><div style="font-size:20px;flex-shrink:0">🇩🇪</div><div class="menu-text"><div class="menu-title">Deutsch</div></div></div>
  </div>
  <div style="font-family:'Nunito','Inter',sans-serif;font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:10px">luki's Voice Language</div>
  <div class="card">
    <div style="font-size:13px;color:var(--text-secondary);margin-bottom:10px">Choose the language luki speaks to Lily:</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--primary-light);border-radius:var(--radius-md);border:1.5px solid var(--primary)">
        <span style="font-size:18px">🇺🇸</span>
        <span style="font-size:13px;font-weight:700;color:var(--primary)">English (US) — Primary</span>
        <i class="fa fa-check-circle" style="margin-left:auto;color:var(--primary)"></i>
      </div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-muted);border-radius:var(--radius-md)">
        <span style="font-size:18px">🇨🇳</span>
        <span style="font-size:13px;font-weight:600;color:var(--text-secondary)">中文 — Secondary</span>
        <i class="fa fa-plus-circle" style="margin-left:auto;color:var(--text-muted)"></i>
      </div>
    </div>
  </div>
</div>
</body>
</html>
