<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 语言模式</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
</head>
<body>
<div style="display:flex;align-items:center;padding:8px 16px 12px">
  <a href="javascript:history.back()" style="width:36px;height:36px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center">
    <i class="ph ph-caret-left" style="font-size:20px;color:var(--text-h)"></i>
  </a>
  <div style="flex:1;text-align:center;font-size:17px;font-weight:700;color:var(--text-h)">语言模式</div>
  <div style="width:36px"></div>
</div>
<div class="page-content" style="padding-top:0">

  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:16px 18px;margin-bottom:12px">
    <div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:14px">界面语言</div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-light)"><span style="font-size:14px;color:var(--text-h)">简体中文</span><i class="ph-fill ph-check-circle" style="font-size:20px;color:var(--c-primary)"></i></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-light)"><span style="font-size:14px;color:var(--text-h)">English</span><i class="ph ph-circle" style="font-size:20px;color:var(--text-muted)"></i></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0"><span style="font-size:14px;color:var(--text-h)">繁體中文</span><i class="ph ph-circle" style="font-size:20px;color:var(--text-muted)"></i></div>
  </div>

  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:16px 18px">
    <div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:14px">对话语言</div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-light)"><span style="font-size:14px;color:var(--text-h)">中文对话</span><i class="ph-fill ph-check-circle" style="font-size:20px;color:var(--c-primary)"></i></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border-light)"><span style="font-size:14px;color:var(--text-h)">中英双语</span><i class="ph ph-circle" style="font-size:20px;color:var(--text-muted)"></i></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0"><span style="font-size:14px;color:var(--text-h)">英文对话</span><i class="ph ph-circle" style="font-size:20px;color:var(--text-muted)"></i></div>
  </div>

</div>
</body>
</html>
