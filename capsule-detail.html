<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 对话详情</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
</head>
<body>
<div style="display:flex;align-items:center;padding:8px 16px 12px">
  <a href="javascript:history.back()" style="width:36px;height:36px;border-radius:50%;background:var(--bg-muted);display:flex;align-items:center;justify-content:center">
    <i class="ph ph-caret-left" style="font-size:20px;color:var(--text-h)"></i>
  </a>
  <div style="flex:1;text-align:center;font-size:17px;font-weight:700;color:var(--text-h)">对话详情</div>
  <div style="width:36px"></div>
</div>
<div class="page-content" style="padding-top:0">

  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:18px;margin-bottom:14px">
    <div style="font-size:18px;font-weight:800;color:var(--text-h);margin-bottom:6px;line-height:1.4">「每一笔涂鸦，都是孩子心中的一片星空」</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <span style="font-size:12px;color:var(--text-muted)">14:10 · 对话 12 分钟 · 8 轮</span>
      <span style="padding:2px 8px;border-radius:var(--r-full);font-size:10px;font-weight:600;background:linear-gradient(135deg,#FBBF24,#F97316);color:white">🦕 luki 伙伴</span>
    </div>
    <div style="background:var(--bg-muted);border-radius:var(--r-lg);height:180px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px;margin-bottom:14px">疗愈插画 · 390 × 180</div>
    <div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:8px">AI 对话总结</div>
    <div style="font-size:13px;color:var(--text-sub);line-height:1.7">小莉今天和 luki 分享了在画画课上的快乐体验，她画了一幅星空下的恐龙。对话中她表达了对色彩的热爱，还说想给妈妈画一幅画作为生日礼物。整体情绪积极，充满创造力。</div>
  </div>

  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:16px 18px;margin-bottom:14px">
    <div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:10px">声音胶囊</div>
    <div style="display:flex;align-items:center;gap:12px;background:var(--bg-muted);border-radius:var(--r-lg);padding:12px 14px">
      <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#FBBF24,#F97316);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0"><i class="ph-fill ph-play" style="font-size:18px;color:white"></i></div>
      <div style="flex:1;height:4px;border-radius:2px;background:rgba(0,0,0,.1)"><div style="width:0%;height:100%;border-radius:2px;background:var(--c-primary)"></div></div>
      <span style="font-size:12px;color:var(--text-muted);font-family:var(--font-en)">0:45</span>
    </div>
  </div>

  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:16px 18px">
    <div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:10px">情绪与标签</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      <span style="padding:4px 12px;border-radius:var(--r-full);font-size:12px;font-weight:600;background:rgba(34,197,94,.1);color:#16A34A">😊 开心</span>
      <span style="padding:4px 12px;border-radius:var(--r-full);font-size:12px;font-weight:600;background:rgba(59,130,246,.1);color:#3B82F6">🎨 画画</span>
      <span style="padding:4px 12px;border-radius:var(--r-full);font-size:12px;font-weight:600;background:rgba(139,92,246,.1);color:#8B5CF6">🦕 恐龙</span>
      <span style="padding:4px 12px;border-radius:var(--r-full);font-size:12px;font-weight:600;background:rgba(249,115,22,.1);color:#F97316">🎁 妈妈生日</span>
    </div>
  </div>

</div>
</body>
</html>
