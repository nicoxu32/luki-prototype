<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 记录时光</title>
<link rel="stylesheet" href="style.css">
<script src='https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js'></script>
</head>
<body>
<div class="status-bar">
  <span style="font-weight:700;font-size:15px;font-family:var(--font-en)">9:41</span>
  <div class="s-icons">
    <i class="ph ph-cell-signal-full" style="font-size:16px"></i>
    <i class="ph ph-wifi-high" style="font-size:16px"></i>
    <i class="ph ph-battery-full" style="font-size:16px"></i>
  </div>
</div><div class="sub-header">
  <a href="moments.html" class="back-btn"><i class="ph ph-caret-left" style="font-size:20px"></i></a>
  <div class="sub-title">记录今天的时光</div>
  <div style="width:36px"></div>
</div>
<div class="page-content">
  <div style="background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:18px;margin-bottom:14px">
    <div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:10px">📸 上传照片</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
      <div style="aspect-ratio:1;border:2px dashed var(--border-light);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg-muted)"><i class="ph ph-plus" style="font-size:24px;color:var(--text-muted)"></i></div>
    </div>
    <div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:10px">🎤 录音</div>
    <div style="display:flex;align-items:center;gap:12px;background:var(--bg-muted);border-radius:var(--r-lg);padding:14px;margin-bottom:16px;cursor:pointer">
      <div style="width:44px;height:44px;border-radius:50%;background:var(--c-primary);display:flex;align-items:center;justify-content:center"><i class="ph ph-microphone" style="font-size:22px;color:white"></i></div>
      <span style="font-size:13px;color:var(--text-sub)">点击录制一段语音</span>
    </div>
    <div style="font-size:14px;font-weight:700;color:var(--text-h);margin-bottom:10px">✏️ 文字记录</div>
    <textarea style="width:100%;height:100px;border:1px solid var(--border-light);border-radius:var(--r-md);padding:12px;font-size:13px;font-family:var(--font-cn);resize:none;background:var(--bg-muted)" placeholder="记录今天和孩子的美好时光..."></textarea>
  </div>
  <button style="width:100%;padding:16px;background:linear-gradient(135deg,#FF8A65,#F97316);color:white;border:none;border-radius:var(--r-xl);font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(249,115,22,.3);font-family:var(--font-cn)" onclick="alert('时光已记录！💛')">保存记录</button>
</div>
</body></html>
