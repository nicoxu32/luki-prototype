<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 添加记忆</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>

</head>
<body>
<div class="status-bar">
  <span style="font-weight:700;font-size:15px;font-family:'DM Sans',sans-serif">9:41</span>
  <div class="s-icons">
    <i class="ph ph-cell-signal-full" style="font-size:16px"></i>
    <i class="ph ph-wifi-high" style="font-size:16px"></i>
    <i class="ph ph-battery-full" style="font-size:16px"></i>
  </div>
</div><div class="back-header">
  <a href="moments.html" class="back-btn"><i class="ph ph-arrow-left" style="font-size:18px"></i></a>
  <div class="back-title">添加记忆</div>
  <span style="font-size:14px;font-weight:600;color:var(--c-primary)">保存</span>
</div>
<div class="page-content">
  <div class="input-group">
    <label class="input-label">记忆标题</label>
    <input class="input-field" placeholder="给这段记忆起个名字...">
  </div>
  <div class="input-group">
    <label class="input-label">记忆内容</label>
    <textarea class="input-field" style="min-height:120px;resize:none" placeholder="记录下这段美好的时光..."></textarea>
  </div>
  <div class="input-group">
    <label class="input-label">情绪标签</label>
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      <span style="display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:999px;font-size:12px;font-weight:600;background:#DCFCE7;color:#15803D;cursor:pointer">😊 开心</span>
      <span style="display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:999px;font-size:12px;font-weight:600;background:var(--bg-muted);color:var(--text-sub);cursor:pointer">🤩 兴奋</span>
      <span style="display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:999px;font-size:12px;font-weight:600;background:var(--bg-muted);color:var(--text-sub);cursor:pointer">😐 平静</span>
      <span style="display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:999px;font-size:12px;font-weight:600;background:var(--bg-muted);color:var(--text-sub);cursor:pointer">😟 担忧</span>
      <span style="display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:999px;font-size:12px;font-weight:600;background:var(--bg-muted);color:var(--text-sub);cursor:pointer">😢 难过</span>
    </div>
  </div>
  <div class="input-group">
    <label class="input-label">添加图片</label>
    <div style="height:120px;border-radius:var(--r-xl);border:1.5px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;background:var(--bg-subtle)">
      <i class="ph ph-image" style="font-size:32px;color:var(--text-muted)"></i>
      <span style="font-size:13px;color:var(--text-muted)">点击上传图片</span>
    </div>
  </div>
  <button style="width:100%;padding:16px;background:var(--c-primary);color:white;border:none;border-radius:var(--r-full);font-size:16px;font-weight:700;cursor:pointer;font-family:var(--font-cn);box-shadow:0 4px 16px rgba(249,115,22,.3)">保存记忆</button>
</div>
</body></html>
