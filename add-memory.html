<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>luki · 添加记忆</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="status-bar"><span class="s-time">9:41</span><div class="s-icons"><i class="fa fa-signal"></i><i class="fa fa-wifi"></i><i class="fa fa-battery-full"></i></div></div>
<div class="back-header">
  <a href="moments.html" class="back-btn"><i class="fa fa-chevron-left"></i></a>
  <div class="back-title">Save Memory</div>
  <div class="back-right" style="color:var(--primary);font-weight:700">Save</div>
</div>
<div class="page-content">
  <div style="background:linear-gradient(135deg,#E8E4DF,#D4CFC9);border-radius:var(--radius-lg);height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:16px;cursor:pointer;border:2px dashed var(--border)">
    <i class="fa fa-camera" style="font-size:28px;color:var(--text-muted);margin-bottom:8px"></i>
    <div style="font-size:13px;color:var(--text-muted);font-weight:500">点击添加照片</div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:3px">可选 · luki 没有摄像头</div>
  </div>
  <div class="input-group">
    <label class="input-label">记忆标题</label>
    <input class="input-field" type="text" placeholder="e.g. Lily's first 英语 self-intro" value="第一次英语自我介绍duction 🌟">
  </div>
  <div class="input-group">
    <label class="input-label">你的备注（可选）</label>
    <textarea class="input-field" rows="3" placeholder="What made this moment special?">Lily was so nervous at first but she did it! I'm so proud of her courage today.</textarea>
  </div>
  <div class="input-group">
    <label class="input-label">记忆类型</label>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div style="background:var(--primary-light);border:1.5px solid var(--primary);border-radius:var(--radius-md);padding:10px 14px;font-size:12px;font-weight:700;color:var(--primary);cursor:pointer">🌟 里程碑</div>
      <div style="background:var(--bg-muted);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:10px 14px;font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer">📸 照片</div>
      <div style="background:var(--bg-muted);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:10px 14px;font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer">🎙️ 语音</div>
      <div style="background:var(--bg-muted);border:1.5px solid var(--border);border-radius:var(--radius-md);padding:10px 14px;font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer">💬 故事</div>
    </div>
  </div>
  <div class="card" style="margin-bottom:16px">
    <div style="font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:8px">关联对话</div>
    <div style="display:flex;align-items:center;gap:10px;background:var(--bg-muted);border-radius:var(--radius-md);padding:10px 12px">
      <div style="width:32px;height:32px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--luki-blue),#7AAFF5);display:flex;align-items:center;justify-content:center;color:white;font-size:14px"><i class="fa fa-robot"></i></div>
      <div><div style="font-size:12px;font-weight:600;color:var(--text-primary)">英语 Coach · Apr 1, 3:40 PM</div><div style="font-size:11px;color:var(--text-muted)">First full 英语 self-introduction</div></div>
      <i class="fa fa-check-circle" style="margin-left:auto;color:#4CAF50;font-size:16px"></i>
    </div>
  </div>
  <div class="toggle-row" style="border-bottom:none;padding:0;margin-bottom:16px">
    <div class="toggle-info"><div class="toggle-label">创建时光胶囊</div><div class="toggle-desc">Lock this memory for Lily to open later</div></div>
    <label class="toggle"><input type="checkbox"><span class="toggle-slider"></span></label>
  </div>
  <button class="btn btn-primary btn-full"><i class="fa fa-bookmark"></i> Save to 记忆</button>
</div>
</body>
</html>
