<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>luki · 账号管理</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
/* ── 账号卡片 ── */
.la-card{background:var(--bg-card);border-radius:var(--r-xl);box-shadow:var(--shadow-card);border:1px solid var(--border-light);padding:18px 20px;margin-bottom:14px}
.la-card-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:var(--text-h);margin-bottom:14px}

/* ── 已绑定账号行 ── */
.la-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border-light)}
.la-item:last-child{border-bottom:none;padding-bottom:0}
.la-item:first-child{padding-top:0}
.la-logo{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.la-info{flex:1}
.la-name{font-size:14px;font-weight:600;color:var(--text-h);margin-bottom:2px}
.la-account{font-size:12px;color:var(--text-muted);font-family:var(--font-en)}
.la-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:var(--r-full);font-size:10px;font-weight:600;background:rgba(34,197,94,.1);color:#16A34A;margin-top:4px}
.la-unbind-btn{padding:6px 14px;border-radius:var(--r-full);border:1.5px solid #FCA5A5;background:#FEF2F2;color:#DC2626;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-cn);flex-shrink:0;transition:.15s}
.la-unbind-btn:active{transform:scale(.96)}

/* ── 新增绑定按钮行 ── */
.la-add-item{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--border-light);cursor:pointer;transition:.1s}
.la-add-item:last-child{border-bottom:none}
.la-add-item:active{opacity:.7}
.la-add-logo{width:40px;height:40px;border-radius:12px;background:var(--bg-muted);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.la-add-label{font-size:14px;font-weight:500;color:var(--text-body);flex:1}
.la-add-arrow{font-size:16px;color:var(--text-muted)}

/* ── 弹窗动画 ── */
@keyframes slideUpLA{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="detail-header">
  <a href="profile.html" class="back-btn"><i class="ph ph-caret-left"></i></a>
  <div class="detail-title">账号管理</div>
  <div style="width:32px"></div>
</div>

<div class="page-content" style="padding-top:8px">

  <!-- ═══ 已绑定账户卡片 ═══ -->
  <div class="la-card">
    <div class="la-card-title">
      <i class="ph-fill ph-check-circle" style="font-size:18px;color:#16A34A"></i>
      已绑定账户 <span style="font-size:13px;font-weight:500;color:var(--text-muted)">（2 个）</span>
    </div>

    <!-- Google -->
    <div class="la-item" id="row-google">
      <div class="la-logo" style="background:#FEF3F2">
        <!-- Google 彩色 G 图标 -->
        <svg width="22" height="22" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.2l6.8-6.8C35.7 2.4 30.2 0 24 0 14.7 0 6.7 5.4 2.7 13.3l7.9 6.1C12.5 13.2 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.6 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8C43.8 37.5 46.6 31.4 46.6 24.5z"/><path fill="#FBBC05" d="M10.6 28.6A14.8 14.8 0 0 1 9.5 24c0-1.6.3-3.1.7-4.6L2.7 13.3A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.7 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.9l-7.9 6.1C6.7 42.6 14.7 48 24 48z"/></svg>
      </div>
      <div class="la-info">
        <div class="la-name">Google</div>
        <div class="la-account">x***o@gmail.com</div>
      </div>
      <button class="la-unbind-btn" onclick="unbindAccount('Google', 'row-google')">解绑</button>
    </div>

    <!-- Apple ID -->
    <div class="la-item" id="row-apple">
      <div class="la-logo" style="background:#F8F8F8">
        <i class="ph ph-apple-logo" style="font-size:22px;color:#1D1D1F"></i>
      </div>
      <div class="la-info">
        <div class="la-name">Apple ID</div>
        <div class="la-account">x***i@icloud.com</div>
      </div>
      <button class="la-unbind-btn" onclick="unbindAccount('Apple ID', 'row-apple')">解绑</button>
    </div>
  </div>

  <!-- ═══ 添加绑定卡片 ═══ -->
  <div class="la-card">
    <div class="la-card-title">
      <i class="ph ph-plus-circle" style="font-size:18px;color:#6366F1"></i>
      添加第三方登录
    </div>

    <!-- 微信（未绑定） -->
    <div class="la-add-item" onclick="bindAccount('微信')">
      <div class="la-add-logo">
        <i class="ph ph-chats" style="font-size:20px;color:#07C160"></i>
      </div>
      <div class="la-add-label">微信</div>
      <i class="ph ph-caret-right la-add-arrow"></i>
    </div>

    <!-- Facebook -->
    <div class="la-add-item" onclick="bindAccount('Facebook')">
      <div class="la-add-logo">
        <i class="ph ph-facebook-logo" style="font-size:20px;color:#1877F2"></i>
      </div>
      <div class="la-add-label">Facebook</div>
      <i class="ph ph-caret-right la-add-arrow"></i>
    </div>

    <!-- Twitter / X -->
    <div class="la-add-item" onclick="bindAccount('X (Twitter)')">
      <div class="la-add-logo">
        <i class="ph ph-x-logo" style="font-size:20px;color:#000"></i>
      </div>
      <div class="la-add-label">X (Twitter)</div>
      <i class="ph ph-caret-right la-add-arrow"></i>
    </div>
  </div>

  <!-- 说明文字 -->
  <div style="background:var(--bg-muted);border-radius:var(--r-lg);padding:12px 14px;font-size:12px;color:var(--text-muted);line-height:1.7">
    <i class="ph ph-info" style="font-size:13px;vertical-align:middle;margin-right:4px;color:var(--text-sub)"></i>
    绑定第三方登录后，可通过对应账户快速登录 luki。解绑操作不会删除您的 luki 账户数据。请至少保留一种登录方式。
  </div>

</div>

<!-- ═══ 解绑确认弹窗 ═══ -->
<div id="unbindOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:none;align-items:flex-end;justify-content:center" onclick="if(event.target===this)closeUnbind()">
  <div style="background:white;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;animation:slideUpLA .25s ease">
    <!-- 图标 -->
    <div style="text-align:center;margin-bottom:12px">
      <div style="width:56px;height:56px;border-radius:50%;background:#FEF2F2;display:inline-flex;align-items:center;justify-content:center">
        <i class="ph ph-link-break" style="font-size:28px;color:#DC2626"></i>
      </div>
    </div>
    <div style="font-size:17px;font-weight:800;color:var(--text-h);text-align:center;margin-bottom:6px">确认解绑</div>
    <div id="unbindDesc" style="font-size:13px;color:var(--text-muted);text-align:center;line-height:1.6;margin-bottom:20px">解绑后将无法使用该账户登录 luki。</div>
    <div style="display:flex;gap:10px">
      <button onclick="closeUnbind()" style="flex:1;padding:13px;border-radius:var(--r-lg);border:1.5px solid var(--border-light);background:white;color:var(--text-body);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-cn)">取消</button>
      <button id="unbindConfirmBtn" style="flex:2;padding:13px;border-radius:var(--r-lg);border:none;background:#DC2626;color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-cn)">确认解绑</button>
    </div>
  </div>
</div>

<!-- ═══ 绑定确认弹窗 ═══ -->
<div id="bindOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:none;align-items:flex-end;justify-content:center" onclick="if(event.target===this)closeBind()">
  <div style="background:white;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;animation:slideUpLA .25s ease">
    <div style="text-align:center;margin-bottom:12px">
      <div style="width:56px;height:56px;border-radius:50%;background:#EEF2FF;display:inline-flex;align-items:center;justify-content:center">
        <i class="ph ph-link" style="font-size:28px;color:#6366F1"></i>
      </div>
    </div>
    <div style="font-size:17px;font-weight:800;color:var(--text-h);text-align:center;margin-bottom:6px">绑定账户</div>
    <div id="bindDesc" style="font-size:13px;color:var(--text-muted);text-align:center;line-height:1.6;margin-bottom:20px">绑定后可使用该账户快速登录 luki。</div>
    <div style="display:flex;gap:10px">
      <button onclick="closeBind()" style="flex:1;padding:13px;border-radius:var(--r-lg);border:1.5px solid var(--border-light);background:white;color:var(--text-body);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-cn)">取消</button>
      <button id="bindConfirmBtn" style="flex:2;padding:13px;border-radius:var(--r-lg);border:none;background:linear-gradient(135deg,#6366F1,#8B5CF6);color:white;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-cn)">前往授权绑定</button>
    </div>
  </div>
</div>

<script>
/* ── 解绑流程 ── */
var _unbindPlatform = '';
var _unbindRowId = '';

function unbindAccount(platform, rowId) {
  _unbindPlatform = platform;
  _unbindRowId = rowId;
  /* 填入说明 */
  document.getElementById('unbindDesc').textContent =
    '解绑「' + platform + '」后将无法通过该账户登录 luki，确认继续？';
  /* 绑定确认按钮事件 */
  document.getElementById('unbindConfirmBtn').onclick = doUnbind;
  document.getElementById('unbindOverlay').style.display = 'flex';
}

function doUnbind() {
  /* 隐藏该行（模拟解绑成功） */
  var row = document.getElementById(_unbindRowId);
  if (row) row.style.display = 'none';
  /* 更新已绑定数量 */
  updateBoundCount();
  closeUnbind();
}

function closeUnbind() {
  document.getElementById('unbindOverlay').style.display = 'none';
}

/* ── 绑定流程 ── */
var _bindPlatform = '';

function bindAccount(platform) {
  _bindPlatform = platform;
  document.getElementById('bindDesc').textContent =
    '即将跳转至「' + platform + '」授权页面，授权后将自动绑定到您的 luki 账户。';
  document.getElementById('bindConfirmBtn').onclick = doBind;
  document.getElementById('bindOverlay').style.display = 'flex';
}

function doBind() {
  closeBind();
  /* 模拟绑定成功 toast */
  showToast('已成功绑定「' + _bindPlatform + '」账户');
}

function closeBind() {
  document.getElementById('bindOverlay').style.display = 'none';
}

/* ── 统计已绑定数量 ── */
function updateBoundCount() {
  var visible = document.querySelectorAll('[id^="row-"]:not([style*="display:none"])').length;
  var titleSpan = document.querySelector('.la-card-title span');
  if (titleSpan) titleSpan.textContent = '（' + visible + ' 个）';
}

/* ── 简易 Toast 提示 ── */
function showToast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:1999;white-space:nowrap;pointer-events:none';
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2500);
}
</script>

</body>
</html>
